<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast Block: Minecraft Edition - MHEnt. Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --mc-green: #5db026; --mc-dirt: #866043; --mc-tnt: #d32f2f; }
        body { margin: 0; padding: 0; height: 100vh; background: #55b2ff; /* Màu trời Minecraft */ color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; transition: 0.1s; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(0,0,0,0.5); border-bottom: 4px solid #000; z-index: 10; }
        .header h1 { margin: 0; color: #55ff55; font-family: monospace; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0 #000; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 80px; position: relative; }

        /* =========================================
           KHỐI GRASS BLOCK (DÙNG CHUNG CHO CÂU HỎI VÀ ĐÁP ÁN)
           ========================================= */
        .question-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 90vw; }
        .options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }

        .mc-grass {
            background: var(--mc-dirt); border: 4px solid #3e2817; border-radius: 2px;
            min-width: 120px; height: 120px; font-size: 28px; font-weight: 900;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3), 5px 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase; position: relative;
            display: flex; align-items: center; justify-content: center; text-shadow: 2px 2px 0 #000;
            transition: 0.2s; cursor: pointer; user-select: none;
        }
        .mc-grass::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 30px;
            background: var(--mc-green); border-bottom: 4px solid #3f7e14; z-index: 0;
        }
        .mc-grass span { position: relative; z-index: 1; }

        .mc-grass:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* LỖ HỔNG */
        .mc-blank {
            background: transparent; border: 4px dashed rgba(0,0,0,0.3); box-shadow: none; color: transparent;
            min-width: 120px; height: 120px; display: flex; align-items: center; justify-content: center;
        }
        .mc-blank::before { display: none; }

        /* DÀNH CHO MEMORY CARD */
        .mc-memory { width: 250px; height: 250px; font-size: 36px; transition: 0.6s; transform-style: preserve-3d; }
        .mc-memory.flipped { transform: rotateY(180deg); }
        .mc-memory span { transition: 0.3s; backface-visibility: hidden; }
        .mc-memory.flipped span { transform: rotateY(180deg); color: #fff; }

        /* =========================================
           KHỐI TNT & MẢNH VỠ (PARTICLES)
           ========================================= */
        .mc-tnt {
            position: absolute; width: 120px; height: 120px; background: var(--mc-tnt);
            border: 4px solid #fff; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; font-family: monospace; color: white; text-shadow: 3px 3px 0 #000;
            z-index: 100; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3);
            pointer-events: none; opacity: 0;
        }
        .mc-tnt::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 30px;
            background: #e53935; border-bottom: 4px solid #b71c1c;
        }
        
        .tnt-drop { animation: dropTNT 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 1; }
        @keyframes dropTNT { 0% { transform: translateY(-300px) scale(0.5); } 100% { transform: translateY(0) scale(1); } }

        .tnt-fuse { animation: fuseFlash 0.2s infinite alternate; }
        @keyframes fuseFlash { 0% { filter: brightness(1); transform: scale(1); } 100% { filter: brightness(3) contrast(0); transform: scale(1.1); } }

        .explosion-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; z-index: 999; pointer-events: none;
            animation: kaboom 0.8s ease-out forwards;
        }
        @keyframes kaboom { 0% { opacity: 1; background: #fff; } 20% { background: #f59e0b; } 100% { opacity: 0; background: transparent; } }

        .shake-screen { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-5px, 5px, 0); } 20%, 80% { transform: translate3d(5px, -5px, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 10px, 0); } 40%, 60% { transform: translate3d(10px, -10px, 0); } }

        /* Mảnh vỡ Block */
        .particle {
            position: fixed; width: 15px; height: 15px; z-index: 50;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .xp-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 12px; background: rgba(0,0,0,0.6); }
        #xp-progress { width: 0%; height: 100%; background: #55ff55; box-shadow: 0 0 20px #55ff55; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-cube"></i> BLAST BLOCK</h1>
        <div id="level-txt" style="font-weight: 900; color: #ffff55; font-size: 20px; text-shadow: 2px 2px 0 #000;">LVL: 1/1</div>
    </div>

    <div class="game-container">
        <div class="question-row" id="question-row"></div>
        <div class="options-area" id="options-area"></div>
    </div>

    <div class="xp-bar"><div id="xp-progress"></div></div>

    <script>
        let questions = [], currentIndex = 0, isProcessing = false;
        const qRow = document.getElementById('question-row');
        const optArea = document.getElementById('options-area');
        const xpProgress = document.getElementById('xp-progress');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        // TIẾNG ĐẬP BLOCK (Pop)
        function playBreak() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playXP() {
            if (!audioCtx) return;
            const freqs = [900, 1100, 1400];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.06);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.06);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.06 + 0.1);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i*0.06); osc.stop(audioCtx.currentTime + i*0.06 + 0.1);
            });
        }

        // TIẾNG XÌ XÌ CỦA TNT
        function playFuse() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(2000, audioCtx.currentTime + 1.5);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1.5);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        // TIẾNG NỔ BÙM
        function playExplosion() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.8);
            g.gain.setValueAtTime(1, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        // HIỆU ỨNG VĂNG MẢNH VỤN (PARTICLES)
        function spawnParticles(element) {
            const rect = element.getBoundingClientRect();
            for(let i=0; i<15; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = rect.left + (Math.random() * rect.width) + 'px';
                p.style.top = rect.top + (Math.random() * rect.height) + 'px';
                p.style.background = Math.random() > 0.3 ? '#866043' : '#5db026'; // Trộn màu đất và cỏ
                document.body.appendChild(p);
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 50 + Math.random() * 100;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity + 150; // Rớt xuống giống trọng lực
                
                p.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 600, easing: 'cubic-bezier(.25,.1,.25,1)' });
                setTimeout(() => p.remove(), 600);
            }
            element.style.opacity = 0; // Giấu khối gốc đi
        }

        // Lắng nghe lệnh từ Admin
        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_blast_cmd') {
                const data = JSON.parse(e.newValue);
                questions = data.payload.questions; 
                currentIndex = 0; 
                loadQuestion();
            }
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                qRow.innerHTML = `<div class="mc-grass" style="width: auto; padding: 0 40px;"><span style="color:#55ff55;">YOU WIN!</span></div>`;
                optArea.innerHTML = ""; 
                return;
            }
            
            isProcessing = false; 
            const cur = questions[currentIndex];
            document.getElementById('level-txt').innerText = `LVL: ${currentIndex + 1}/${questions.length}`;
            document.body.classList.remove('shake-screen');
            
            // 1. RENDER CÂU HỎI
            qRow.innerHTML = "";
            
            if (cur.type === 'memory') {
                const block = document.createElement('div');
                block.className = 'mc-grass mc-memory';
                block.innerHTML = `<span>${cur.q}</span>`;
                qRow.appendChild(block);
            } else {
                const safeQ = cur.q.replace(/___/g, ' ___ ').trim();
                const words = safeQ.split(/\s+/); 
                let hasBlank = false;

                words.forEach(w => {
                    const block = document.createElement('div');
                    if (w === '___') {
                        block.className = 'mc-blank';
                        block.id = 'blank-spot';
                        hasBlank = true;
                    } else {
                        block.className = 'mc-grass';
                        block.innerHTML = `<span>${w}</span>`;
                    }
                    qRow.appendChild(block);
                });

                if (!hasBlank) {
                    const blankBlock = document.createElement('div');
                    blankBlock.className = 'mc-blank';
                    blankBlock.id = 'blank-spot';
                    qRow.appendChild(blankBlock);
                }
            }

            // 2. RENDER ĐÁP ÁN DƯỚI DẠNG GRASS BLOCK
            optArea.innerHTML = "";
            let opts = (cur.type === 'memory') ? [cur.a] : cur.options;
            if (cur.type !== 'memory') opts = [...opts].sort(() => Math.random() - 0.5);

            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'mc-grass'; 
                btn.innerHTML = `<span>${o}</span>`;
                btn.onclick = () => checkAnswer(o, btn);
                optArea.appendChild(btn);
            });
            
            xpProgress.style.width = (currentIndex / questions.length) * 100 + "%";
        }

        function checkAnswer(choice, element) {
            if(isProcessing) return; 
            isProcessing = true; initAudio();
            
            const cur = questions[currentIndex];
            const isCorrect = (choice === cur.a);
            const blankSpot = document.getElementById('blank-spot');

            // ĐÚNG RỒI: Đắp gạch, Bể khối, Nhận XP
            if (isCorrect) {
                if (cur.type !== 'memory' && blankSpot) {
                    // Đắp gạch vào lỗ
                    blankSpot.className = 'mc-grass';
                    blankSpot.innerHTML = `<span>${choice}</span>`;
                    element.style.opacity = '0'; // Xóa gạch ở dưới
                }

                setTimeout(() => {
                    if(cur.type === 'memory') {
                        const memBlock = qRow.firstChild;
                        memBlock.classList.add('flipped');
                        memBlock.querySelector('span').innerText = cur.a;
                    }

                    setTimeout(() => {
                        playBreak(); playXP();
                        // Nổ văng mảnh vụn toàn bộ khối câu hỏi và đáp án
                        Array.from(qRow.children).forEach(c => spawnParticles(c));
                        if(cur.type !== 'memory') spawnParticles(element);
                        
                        setTimeout(() => { currentIndex++; loadQuestion(); }, 800);
                    }, cur.type === 'memory' ? 800 : 500);
                }, 100);
            } 
            // SAI RỒI: Thả TNT
            else {
                let targetRect = (blankSpot || qRow.firstChild).getBoundingClientRect();
                
                // Tạo khối TNT bay từ trên xuống
                const tnt = document.createElement('div');
                tnt.className = 'mc-tnt tnt-drop';
                tnt.innerText = 'TNT';
                // Đặt tọa độ đè lên cái lỗ hoặc khối Memory
                tnt.style.left = targetRect.left + 'px';
                tnt.style.top = targetRect.top + 'px';
                document.body.appendChild(tnt);

                setTimeout(() => {
                    // TNT bắt đầu cháy
                    playFuse();
                    tnt.classList.remove('tnt-drop');
                    tnt.classList.add('tnt-fuse');

                    setTimeout(() => {
                        // KABOOOMMM!!!
                        playExplosion();
                        document.body.classList.add('shake-screen');
                        
                        // Chớp trắng màn hình
                        const flash = document.createElement('div');
                        flash.className = 'explosion-flash';
                        document.body.appendChild(flash);
                        setTimeout(() => flash.remove(), 800);

                        // Dọn dẹp xác TNT và nạp lại câu hỏi
                        tnt.remove();
                        qRow.innerHTML = ""; optArea.innerHTML = "";
                        
                        setTimeout(() => { loadQuestion(); }, 500); 
                    }, 1500); // Đợi 1.5s xì xì rồi nổ
                }, 500); // Đợi 0.5s rớt xuống
            }
        }
    </script>
</body>
</html>
