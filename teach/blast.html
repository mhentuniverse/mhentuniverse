<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast Block: Minecraft Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --mc-green: #5db026; --mc-dirt: #866043; --mc-stone: #7a7a7a; --mc-tnt: #d32f2f; }
        body { margin: 0; padding: 0; height: 100vh; background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-matter.png'); color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #333; border-bottom: 5px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .header h1 { margin: 0; color: #55ff55; font-family: monospace; text-transform: uppercase; letter-spacing: 2px; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 40px; }

        /* KHỐI MINECRAFT 3D */
        .mc-block {
            width: 250px; height: 250px; background: var(--mc-stone);
            border: 10px solid #444; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900; text-align: center; padding: 20px;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.3), inset 10px 10px 0 rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: default;
        }
        .mc-block::before { content: ""; position: absolute; top: -10px; left: -10px; right: -10px; height: 40px; background: var(--mc-green); border-bottom: 10px solid #3f7e14; }

        .block-q.flipped { transform: rotateY(180deg); background: #55ff55; border-color: #3f7e14; }
        .block-q.flipped span { transform: rotateY(180deg); color: #000; }

        /* ĐÁP ÁN DẠNG BLOCK DIRT */
        .options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .mc-ans {
            min-width: 140px; padding: 20px; background: var(--mc-dirt);
            border: 6px solid #4d3321; border-radius: 4px;
            font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4); text-transform: uppercase;
        }
        .mc-ans:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* ANIMATION BREAK (Vỡ như Minecraft) */
        @keyframes mc-break {
            0% { transform: scale(1); opacity: 1; filter: grayscale(0); }
            30% { transform: scale(1.1); filter: contrast(2); }
            100% { transform: scale(0); opacity: 0; filter: blur(10px); }
        }
        .break-effect { animation: mc-break 0.5s forwards !important; }

        /* ANIMATION EXPLODE (TNT) */
        @keyframes mc-tnt-boom {
            0% { background: white; transform: scale(1); }
            20% { background: #ff0000; transform: scale(1.2); }
            40% { background: white; transform: scale(0.9); }
            100% { transform: scale(4); opacity: 0; background: #ffaa00; }
        }
        .explode-effect { animation: mc-tnt-boom 0.6s forwards !important; }

        .xp-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 12px; background: #000; }
        #xp-progress { width: 0%; height: 100%; background: #55ff55; box-shadow: 0 0 20px #55ff55; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-cube"></i> BLAST BLOCK: MINECRAFT</h1>
        <div id="level-txt" style="font-weight: 900; color: #ffff55;">LVL: 1/1</div>
    </div>

    <div class="game-container">
        <div class="mc-block block-q" id="question-block">
            <span id="q-text">ĐANG CHỜ ADMIN...</span>
        </div>

        <div class="options-area" id="options-area"></div>
    </div>

    <div class="xp-bar"><div id="xp-progress"></div></div>

    <script>
        let questions = [], currentIndex = 0, isProcessing = false;
        const qBlock = document.getElementById('question-block'), qText = document.getElementById('q-text');
        const optArea = document.getElementById('options-area'), xpProgress = document.getElementById('xp-progress');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        // GIẢ LẬP TIẾNG XP (LENG KENG)
        function playXP() {
            if (!audioCtx) return;
            const freqs = [900, 1100, 1400];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.06);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.06);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.06 + 0.1);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i*0.06); osc.stop(audioCtx.currentTime + i*0.06 + 0.1);
            });
        }

        // GIẢ LẬP TIẾNG TNT (BÙM)
        function playTNT() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.6, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_blast_cmd') {
                const data = JSON.parse(e.newValue);
                questions = data.payload.questions; currentIndex = 0; loadQuestion();
            }
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                qText.innerText = "YOU WIN! XP MAXED!"; optArea.innerHTML = ""; return;
            }
            isProcessing = false; const cur = questions[currentIndex];
            document.getElementById('level-txt').innerText = `LVL: ${currentIndex + 1}/${questions.length}`;
            qBlock.classList.remove('flipped', 'break-effect', 'explode-effect');
            qBlock.style.display = 'flex'; qText.innerText = cur.q;
            
            optArea.innerHTML = "";
            let opts = (cur.type === 'memory') ? [cur.a] : cur.options;
            if(cur.type !== 'memory') opts = [...opts].sort(() => Math.random() - 0.5); // Trộn đáp án nếu trắc nghiệm

            opts.forEach(o => {
                const b = document.createElement('div');
                b.className = 'mc-ans'; b.innerText = o;
                b.onclick = () => checkAnswer(o, b);
                optArea.appendChild(b);
            });
            xpProgress.style.width = (currentIndex / questions.length) * 100 + "%";
        }

        function checkAnswer(choice, element) {
            if(isProcessing) return; isProcessing = true; initAudio();
            const correct = questions[currentIndex].a;

            if (choice === correct) {
                playXP();
                if(questions[currentIndex].type === 'memory') qBlock.classList.add('flipped');
                setTimeout(() => {
                    qBlock.classList.add('break-effect'); element.classList.add('break-effect');
                    setTimeout(() => { currentIndex++; loadQuestion(); }, 600);
                }, 800);
            } else {
                playTNT();
                qBlock.classList.add('explode-effect'); element.classList.add('explode-effect');
                setTimeout(() => { loadQuestion(); }, 800); // Nổ xong thì hồi sinh lại câu đó
            }
        }
    </script>
</body>
</html>
