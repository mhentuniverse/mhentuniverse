<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin Hội Thi - MHEnt. Arena</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/arena/arena-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .desc-container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .desc-box { background: #fff; border-radius: 25px; padding: 40px; box-shadow: 0 15px 40px rgba(255, 154, 85, 0.1); border: 1px solid rgba(255, 154, 85, 0.15); transition: 0.3s;}
        .quiz-title-big { font-size: 30px; font-weight: 900; color: #1e293b; margin-bottom: 15px; line-height: 1.3; font-family: 'Nunito', sans-serif !important; }
        
        .quiz-meta-tag { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .quiz-meta-tag span { font-weight: 800; font-size: 13.5px; padding: 7px 18px; border-radius: 30px; display: flex; align-items: center; gap: 6px; }

        .quiz-rules { background: #fdfaf8; padding: 30px; border-radius: 15px; font-size: 15.5px; color: #475569; line-height: 1.8; margin-bottom: 35px; border-left: 5px solid var(--hub-color); white-space: pre-wrap; font-family: 'Nunito', sans-serif !important; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);}
        
        .btn-trigger-popup { width: 100%; background: linear-gradient(135deg, #ff9a55, #ff7a22); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 17px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 8px 20px rgba(255, 154, 85, 0.3); }
        .btn-trigger-popup:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(255, 154, 85, 0.5); }
        .btn-trigger-popup:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; opacity: 0.7;}

        /* =========================================
           POPUP ĐIỀN THÔNG TIN "MHENT TOURNAMENT CARD"
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: linear-gradient(135deg, #fffcf9 0%, #fff1e9 100%); /* Nền Cam tint mượt mà */
            width: 92%; max-width: 450px; border-radius: 25px;
            padding: 45px; position: relative;
            transform: scale(0.9) translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 70px rgba(255, 154, 85, 0.15); /* Bóng Huge Soft Shadow */
            border: 1px solid rgba(255, 154, 85, 0.3);
            font-family: 'Nunito', sans-serif !important;
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        
        .btn-close-modal {
            position: absolute; top: 20px; right: 25px; font-size: 30px;
            cursor: pointer; color: #94a3b8; transition: 0.3s; line-height: 1;
        }
        .btn-close-modal:hover { color: #ef4444; transform: scale(1.15) rotate(90deg); }

        .form-header { text-align: center; margin-bottom: 30px; }
        .form-title { font-size: 22px; font-weight: 900; color: #1e293b; margin: 0; line-height: 1.2; }
        .form-subtitle { font-size: 14px; color: #64748b; margin-top: 5px; font-weight: 700; display: block; }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-weight: 800; color: #1e293b; margin-bottom: 8px; font-size: 14px; }
        .arena-input-form { width: 100%; padding: 14px 18px; border-radius: 12px; border: 2px solid transparent; background: rgba(255,255,255,0.7); font-family: 'Nunito', sans-serif !important; font-size: 15px; font-weight: 700; outline: none; transition: 0.3s; box-sizing: border-box; color: #1e293b; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .arena-input-form:focus { border-color: var(--hub-color); background: #fff; box-shadow: 0 4px 15px rgba(255, 154, 85, 0.15);}
        .arena-input-form::placeholder { color: #94a3b8; font-weight: 600; opacity: 0.7;}
        
        .btn-start-quiz { width: 100%; background: var(--hub-color); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 16.5px; cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 6px 15px rgba(255, 154, 85, 0.3);}
        .btn-start-quiz:hover { background: #e8833e; box-shadow: 0 8px 20px rgba(255, 154, 85, 0.4); }

        /* DARK MODE GHI ĐÈ */
        body.dark-mode .desc-box, body.dark-mode .modal-content { background: #1a2233; border-color: #334155; }
        body.dark-mode .quiz-title-big, body.dark-mode .form-title { color: #fff; }
        body.dark-mode .quiz-rules { background: #0f172a; color: #cbd5e1; border-color: var(--hub-color); box-shadow: none;}
        body.dark-mode .quiz-meta-tag span { color: #cbd5e1 !important; background: rgba(255,255,255,0.05) !important;}
        body.dark-mode .form-subtitle, body.dark-mode .input-group label { color: #94a3b8; }
        body.dark-mode .modal-content { background: linear-gradient(135deg, #1e293b 0%, #1a2233 100%); }
        body.dark-mode .arena-input-form { background: #0f172a; border-color: #334155; color: white; }
    </style>
</head>
<body class="gradient-bg">

    <nav class="navbar">
        <div class="nav-left">
            <a onclick="window.location.href='/arena/'" style="cursor: pointer;">
                <img src="/assets/avt-web.jpg" alt="Avatar Web" class="avt-img">
                <span class="logo-name">MHEnt. Arena</span>
            </a>
        </div>
        <div class="nav-right">
            <button class="btn-theme" onclick="window.history.back()" title="Quay lại"><i class="fa-solid fa-arrow-left"></i></button>
        </div>
    </nav>

    <main class="desc-container">
        <div class="desc-box" id="quiz-details-box">
            <div style="text-align: center; color: #888; padding: 40px;">
                <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: var(--hub-color); margin-bottom: 20px;"></i><br>
                Đang nạp năng lượng dữ liệu từ Sheets...
            </div>
        </div>
    </main>

    <div id="info-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="btn-close-modal" onclick="closeModal()">&times;</span>
            <div class="form-header">
                <h3 class="form-title">Sẵn sàng nhập cuộc?</h3>
                <span class="form-subtitle">Điền thông tin để ghi danh trên bảng vàng MHEnt nhé!</span>
            </div>
            
            <form id="student-form">
                <div class="input-group">
                    <label>Họ và Tên đầy đủ *</label>
                    <input type="text" id="inp-name" class="arena-input-form" placeholder="Ví dụ: Nguyễn Văn A" required autocomplete="off">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Mã Sinh Viên *</label>
                        <input type="text" id="inp-mssv" class="arena-input-form" placeholder="Ví dụ: 26201234" required autocomplete="off">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Lớp / Chi đoàn *</label>
                        <input type="text" id="inp-class" class="arena-input-form" placeholder="Ví dụ: 24DTH1" required autocomplete="off">
                    </div>
                </div>
                <button type="submit" class="btn-start-quiz">
                    VÀO PHÒNG THI NGAY <i class="fa-solid fa-paper-plane" style="margin-left: 7px;"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvZ5kkhteHrZ02rTN-bAR015PlqUm1TM_LgxRAKE2_vtHHGBzYgfPh-5NdilEECx_J_g/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');

        function openModal() { document.getElementById('info-modal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('info-modal').classList.remove('active'); document.body.style.overflow = ''; }
        document.getElementById('info-modal').addEventListener('click', function(e) { if(e.target === this) closeModal(); });

        async function loadQuizDetails() {
            if (!quizId) {
                document.getElementById('quiz-details-box').innerHTML = '<h3 style="color:red; text-align:center;">Lỗi: Không tìm thấy mã cuộc thi!</h3>';
                return;
            }

            try {
                let response = await fetch(API_URL + "?action=getQuizList");
                let result = await response.json();
                let quiz = result.data.find(q => q.id === quizId);

                if (!quiz) {
                    document.getElementById('quiz-details-box').innerHTML = '<h3 style="color:red; text-align:center;">Lỗi bùa chú! Đề thi chưa sẵn sàng hoặc mã sai.</h3>';
                    return;
                }

                let btnDisabled = (quiz.status === 'closed') ? 'disabled' : '';
                let btnText = '';
                
                if (quiz.status === 'closed') btnText = 'HỘI THI ĐANG KHÓA <i class="fa-solid fa-lock"></i>';
                else if (quiz.status === 'test') btnText = 'VÀO TEST ĐỀ (DÀNH CHO BTC) <i class="fa-solid fa-vial-circle-check"></i>';
                else btnText = 'BẮT ĐẦU THI NGAY <i class="fa-solid fa-bolt"></i>';

                document.getElementById('quiz-details-box').innerHTML = `
                    <h1 class="quiz-title-big">${quiz.title}</h1>
                    <div class="quiz-meta-tag">
                        <span style="color:var(--hub-color); background:var(--hub-bg);"><i class="fa-solid fa-fingerprint"></i> Mã: ${quiz.id}</span>
                        <span style="color:#64748b; background:#f1f5f9;"><i class="fa-solid fa-list-ol"></i> ${quiz.questionCount} câu hỏi</span>
                        <span style="color:#ef4444; background:#fee2e2;"><i class="fa-solid fa-stopwatch"></i> ${quiz.timeLimit} phút</span>
                    </div>
                    
                    <div class="quiz-rules"><strong>Mô tả & Thể lệ:</strong>\n${quiz.desc}</div>

                    <button class="btn-trigger-popup" onclick="openModal()" ${btnDisabled}>
                        ${btnText}
                    </button>
                `;

                document.getElementById('student-form').addEventListener('submit', function(e) {
                    e.preventDefault(); 
                    localStorage.setItem('mhent_arena_user', JSON.stringify({
                        fullName: document.getElementById('inp-name').value.trim(),
                        studentId: document.getElementById('inp-mssv').value.trim(),
                        className: document.getElementById('inp-class').value.trim()
                    }));
                    closeModal();
                    
                    let extraParam = (quiz.status === 'test') ? '&mode=test' : '';
                    window.location.href = `/arena/quiz.html?id=${quizId}${extraParam}`;
                });

            } catch (err) {
                document.getElementById('quiz-details-box').innerHTML = '<h3 style="color:red; text-align:center;">Mất kết nối với Két Sắt! Vui lòng F5 lại trang.</h3>';
            }
        }
        loadQuizDetails();
    </script>
</body>
</html>
