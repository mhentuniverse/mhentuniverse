<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sảnh Chờ - Cờ Tướng .io | MHEnt. Game</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ef4444">
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/game/game-theme.css"> 
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Ghi đè màu chủ đạo riêng cho Cờ Tướng (Đỏ Mận / Đỏ Bã Trầu) */
        :root { 
            --xiangqi-color: #dc2626; 
            --xiangqi-bg: rgba(220, 38, 38, 0.1); 
            --xiangqi-dark: #991b1b;
        }

        body { background: #f8fafc; }
        body.dark-mode { background: #0f172a; }

        .lobby-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* CARD TẠO / VÀO PHÒNG */
        .action-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.dark-mode .action-card { background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .action-card:hover { border-color: var(--xiangqi-color); transform: translateY(-5px); box-shadow: 0 15px 35px var(--xiangqi-bg); }

        .action-icon {
            font-size: 55px;
            color: var(--xiangqi-color);
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .action-card:hover .action-icon { transform: scale(1.1); }

        .action-title { font-size: 24px; font-weight: 900; margin-bottom: 15px; color: #1e293b; }
        body.dark-mode .action-title { color: #f8fafc; }

        .room-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 8px; /* Giãn cách lúc gõ số */
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            background: #f8fafc;
            color: var(--xiangqi-color);
            transition: 0.3s;
        }
        /* MẸO FIX LỖI PLACEHOLDER: Trả placeholder về bình thường, không bị giãn */
        .room-input::placeholder { letter-spacing: 1px; font-weight: 600; color: #94a3b8; font-size: 16px; }
        .room-input:focus { border-color: var(--xiangqi-color); background: #fff; box-shadow: 0 4px 15px var(--xiangqi-bg); }
        body.dark-mode .room-input { background: #0f172a; border-color: #334155; }
        body.dark-mode .room-input:focus { background: #1e293b; }

        .btn-xiangqi {
            background: var(--xiangqi-color);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 15px var(--xiangqi-bg);
            text-transform: uppercase;
        }
        .btn-xiangqi:hover { background: var(--xiangqi-dark); transform: translateY(-2px); box-shadow: 0 8px 20px var(--xiangqi-bg); }
        .btn-xiangqi:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        /* DANH SÁCH BÀN ĐANG CHỜ */
        .room-list-container {
            grid-column: 1 / -1;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }
        body.dark-mode .room-list-container { background: #1e293b; border-color: #334155; }
        
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .room-item {
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            background: #f8fafc;
        }
        body.dark-mode .room-item { border-color: #334155; background: #0f172a; }
        .room-item:hover { border-color: var(--xiangqi-color); background: #fff; box-shadow: 0 10px 25px var(--xiangqi-bg); transform: translateY(-3px); }
        body.dark-mode .room-item:hover { background: #1e293b; }
        
        .host-info { display: flex; align-items: center; gap: 12px; }
        .host-avt { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #e2e8f0; object-fit: cover; }
        .room-item:hover .host-avt { border-color: var(--xiangqi-color); }
        .host-name { font-weight: 800; font-size: 16px; color: #1e293b; margin: 0 0 4px 0;}
        body.dark-mode .host-name { color: #f8fafc; }
        .room-id-badge { background: #e2e8f0; color: #475569; font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 8px; letter-spacing: 1px;}
        body.dark-mode .room-id-badge { background: #334155; color: #cbd5e1; }
        .room-item:hover .room-id-badge { background: var(--xiangqi-bg); color: var(--xiangqi-color); }

        /* Tinh chỉnh Navbar cho đỡ phèn */
        .btn-back:hover { background: var(--xiangqi-bg) !important; color: var(--xiangqi-color) !important; border-color: var(--xiangqi-color) !important;}
        .btn-theme:hover { background: var(--xiangqi-bg) !important; color: var(--xiangqi-color) !important; border-color: var(--xiangqi-color) !important;}

        @media (max-width: 768px) {
            .lobby-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    
    <nav class="navbar" style="border-bottom-color: rgba(220, 38, 38, 0.2);">
        <div class="nav-left">
            <button class="btn-back" onclick="window.location.href='/game'">
                <i class="fa-solid fa-arrow-left"></i> Rời sảnh
            </button>
            <span class="logo-name" style="margin-left: 15px; color: var(--xiangqi-color) !important;">Cờ Tướng .io</span>
        </div>
        
        <div class="nav-right">
            <button id="btn-theme-toggle" class="btn-theme" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon"></i>
            </button>
            <div id="user-profile" class="user-profile" style="display: flex; align-items: center; gap: 8px;">
                <img id="user-avatar" src="/assets/avt-web.jpg" class="user-avatar" style="border-color: var(--xiangqi-color) !important;">
                <span id="user-name" class="user-name">Đang tải...</span>
            </div>
        </div>
    </nav>

    <div class="lobby-container">
        
        <div class="action-card">
            <div class="action-icon"><i class="fa-solid fa-chess-board"></i></div>
            <h2 class="action-title">Tạo Bàn Cờ Mới</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Tạo phòng riêng, nhận mã PIN và gửi cho đối thủ để bắt đầu trận đấu tâm trí.</p>
            <button class="btn-xiangqi" id="btn-create-room" onclick="createRoom()">
                <i class="fa-solid fa-plus"></i> TẠO PHÒNG NGAY
            </button>
        </div>

        <div class="action-card">
            <div class="action-icon"><i class="fa-solid fa-door-open"></i></div>
            <h2 class="action-title">Tham Gia Bằng Mã</h2>
            <p style="color: #64748b; margin-bottom: 10px;">Đã có mã phòng từ bạn bè? Nhập dãy 5 số vào đây để tiến vào bàn cờ.</p>
            <input type="text" id="join-room-id" class="room-input" placeholder="VD: 83921" maxlength="5" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
            <button class="btn-xiangqi" id="btn-join-room" onclick="joinRoomByInput()" style="background: #1e293b;">
                <i class="fa-solid fa-right-to-bracket"></i> VÀO BÀN
            </button>
        </div>

        <div class="room-list-container">
            <h2 style="margin-top: 0; color: #1e293b; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-satellite-dish fa-beat" style="color: var(--xiangqi-color);"></i> Các Kỳ thủ đang tìm đối thủ
            </h2>
            <div class="room-grid" id="public-rooms-grid">
                <div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 20px;">
                    <i class="fa-solid fa-spinner fa-spin"></i> Đang quét radar tìm phòng...
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDKDAAnmeqWFRqUZWTVa--m5-cORyHCoUk", authDomain: "mhentuniverse.firebaseapp.com", projectId: "mhentuniverse", storageBucket: "mhentuniverse.firebasestorage.app", messagingSenderId: "377044322952", appId: "1:377044322952:web:d657d1b0806d37d9246d3d" };
        const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // Dark mode logic
        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('mhent_dark_mode', document.body.classList.contains('dark-mode') ? 'on' : 'off');
        };
        if (localStorage.getItem('mhent_dark_mode') === 'on') document.body.classList.add('dark-mode');

        // Check Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-avatar').src = user.photoURL || '/assets/avt-web.jpg';
                listenForRooms(); // Chỉ load phòng khi đã đăng nhập
            } else {
                showToast("Cảnh báo", "Sếp phải đăng nhập mới được đánh cờ nha!", "warning");
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            }
        });

        // TẠO PHÒNG MỚI
        window.createRoom = async function() {
            if(!currentUser) return;
            const btn = document.getElementById('btn-create-room');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG TẠO...';
            btn.disabled = true;

            // Generate mã 5 số ngẫu nhiên
            const roomId = Math.floor(10000 + Math.random() * 90000).toString();

            try {
                // Tạo record trên Firestore
                await setDoc(doc(db, "xiangqi_rooms", roomId), {
                    hostId: currentUser.uid,
                    hostName: currentUser.displayName || currentUser.email.split('@')[0],
                    hostAvatar: currentUser.photoURL || '/assets/avt-web.jpg',
                    guestId: null,
                    guestName: null,
                    status: 'waiting', // waiting, playing, finished
                    createdAt: serverTimestamp(),
                    turn: 'red' // Đỏ đi trước
                });

                // Nhảy thẳng vào bàn cờ (file play.html tụi mình sẽ code sau)
                window.location.href = `/game/xiangqi/play?id=${roomId}`;
            } catch (error) {
                console.error(error);
                showToast("Lỗi", "Không thể tạo phòng lúc này!", "error");
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> TẠO PHÒNG NGAY';
                btn.disabled = false;
            }
        };

        // NHẬP MÃ VÀO PHÒNG
        window.joinRoomByInput = function() {
            const roomId = document.getElementById('join-room-id').value.trim();
            if(roomId.length !== 5) {
                return showToast("Lỗi", "Mã phòng phải có đúng 5 chữ số!", "error");
            }
            joinRoomDirectly(roomId);
        };

        // HÀM VÀO PHÒNG CHUNG (Dùng cho cả Nhập mã và Bấm nút Xâm lăng)
        window.joinRoomDirectly = async function(roomId) {
            if(!currentUser) return;
            try {
                const roomRef = doc(db, "xiangqi_rooms", roomId);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) {
                    const data = roomSnap.data();
                    
                    // Nếu phòng đang chờ
                    if (data.status === 'waiting') {
                        // Nếu mình chính là chủ phòng (vô tình rớt mạng thoát ra vào lại)
                        if(data.hostId === currentUser.uid) {
                            window.location.href = `/game/xiangqi/play?id=${roomId}`;
                            return;
                        }
                        
                        // Cập nhật mình là người chơi thứ 2 (Guest) và khóa phòng (chuyển sang playing)
                        await updateDoc(roomRef, {
                            guestId: currentUser.uid,
                            guestName: currentUser.displayName || currentUser.email.split('@')[0],
                            guestAvatar: currentUser.photoURL || '/assets/avt-web.jpg',
                            status: 'playing'
                        });
                        window.location.href = `/game/xiangqi/play?id=${roomId}`;
                    } 
                    // Nếu phòng đang chơi nhưng mình là 1 trong 2 người đang chơi (Re-join)
                    else if (data.status === 'playing' && (data.hostId === currentUser.uid || data.guestId === currentUser.uid)) {
                        window.location.href = `/game/xiangqi/play?id=${roomId}`;
                    } 
                    else {
                        showToast("Thất bại", "Phòng này đã đầy hoặc ván đấu đang diễn ra rồi!", "error");
                    }
                } else {
                    showToast("Lỗi", "Mã phòng không tồn tại. Hỏi lại bạn sếp xem!", "error");
                }
            } catch (error) {
                console.error(error);
                showToast("Lỗi", "Đường truyền gián đoạn!", "error");
            }
        };

        // RADAR QUÉT CÁC PHÒNG ĐANG CHỜ (Realtime)
        function listenForRooms() {
            const grid = document.getElementById('public-rooms-grid');
            const q = query(collection(db, "xiangqi_rooms"), where("status", "==", "waiting"));
            
            onSnapshot(q, (querySnapshot) => {
                grid.innerHTML = '';
                let count = 0;
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const roomId = docSnap.id;
                    
                    // Không hiện phòng của chính mình lên Radar (hoặc có thể hiện nhưng mờ đi)
                    if (data.hostId !== currentUser.uid) {
                        count++;
                        grid.innerHTML += `
                            <div class="room-item">
                                <div class="host-info">
                                    <img src="${data.hostAvatar}" class="host-avt">
                                    <div>
                                        <p class="host-name">${data.hostName}</p>
                                        <span class="room-id-badge">ID: ${roomId}</span>
                                    </div>
                                </div>
                                <button class="btn-xiangqi" style="width: auto; padding: 10px 20px; font-size: 14px;" onclick="joinRoomDirectly('${roomId}')">
                                    CHIẾN <i class="fa-solid fa-swords"></i>
                                </button>
                            </div>
                        `;
                    }
                });

                if (count === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 20px;">Hiện không có kỳ thủ nào đang đợi. Cậu hãy tự Tạo phòng nhé!</div>';
                }
            });
        }
    </script>
    <script src="/mhent-ui.js"></script>
    <script src="/check-token.js"></script>
</body>
</html>
