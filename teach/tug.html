<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Chiến Kéo Co - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tớ giữ nguyên CSS cũ nhưng chỉnh kích thước flashcard một chút để chứa được câu hỏi dài */
        body { margin: 0; padding: 0; height: 100vh; background: #0f172a; color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        .score-board { display: flex; justify-content: space-between; align-items: stretch; height: 120px; background: #1e293b; border-bottom: 4px solid #334155; }
        .team-box { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .team-1 { background: linear-gradient(90deg, #be123c 0%, #1e293b 100%); }
        .team-2 { background: linear-gradient(-90deg, #1d4ed8 0%, #1e293b 100%); }
        .team-name { font-size: 24px; font-weight: 900; text-transform: uppercase; color: rgba(255,255,255,0.8); letter-spacing: 2px; }
        .team-score { font-size: 60px; font-weight: 900; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .t1-color { color: #f43f5e; } .t2-color { color: #3b82f6; }
        .tug-arena { position: relative; height: 160px; display: flex; align-items: center; justify-content: center; padding: 0 10%; margin-top: 20px; }
        .rope-container { position: relative; width: 100%; height: 20px; background: #8b4513; border-radius: 10px; border-top: 3px solid #a0522d; border-bottom: 3px solid #5c2e0b; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .center-mark { position: absolute; left: 50%; top: -30px; bottom: -30px; width: 4px; background: rgba(255,255,255,0.2); border-left: 2px dashed rgba(255,255,255,0.5); transform: translateX(-50%); }
        .flag-marker { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .flag-marker i { font-size: 70px; color: #fbbf24; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .vocab-arena { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .flashcard { background: white; border-radius: 20px; width: 85%; max-width: 800px; min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; padding: 40px; border-bottom: 8px solid #cbd5e1; }
        .vocab-vn { font-size: 40px; font-weight: 900; color: #0f172a; margin-bottom: 20px; line-height: 1.3; }
        .vocab-en { font-size: 45px; font-weight: 800; color: #10b981; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
        .vocab-en.show { opacity: 1; transform: translateY(0); }
        .controls { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px 40px; border-top: 2px solid #334155; }
        .btn { padding: 15px 30px; font-size: 20px; font-weight: 900; font-family: 'Nunito'; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; color: white; }
        .btn-t1 { background: #e11d48; box-shadow: 0 5px 0 #9f1239; } 
        .btn-t2 { background: #2563eb; box-shadow: 0 5px 0 #1e40af; } 
        .btn-reveal { background: #f59e0b; box-shadow: 0 5px 0 #b45309; font-size: 24px; padding: 15px 50px; }
        .popup { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100; flex-direction: column; text-align: center; padding: 20px;}
        .popup.show { opacity: 1; pointer-events: auto; }
        .win-title { font-size: 70px; font-weight: 900; margin: 0; text-shadow: 0 10px 30px rgba(0,0,0,0.5); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="score-board">
        <div class="team-box team-1">
            <div class="team-name">TEAM 1 (ĐỎ)</div>
            <div class="team-score t1-color" id="score-1">0</div>
        </div>
        <div class="team-box team-2">
            <div class="team-name">TEAM 2 (XANH)</div>
            <div class="team-score t2-color" id="score-2">0</div>
        </div>
    </div>

    <div class="tug-arena">
        <div class="rope-container">
            <div class="center-mark"></div>
            <div class="flag-marker" id="flag"><i class="fa-solid fa-flag"></i></div>
        </div>
    </div>

    <div class="vocab-arena">
        <div class="flashcard">
            <div style="font-size: 16px; color: #94a3b8; margin-bottom: 10px; font-weight: 800;" id="q-count-display">CÂU HỎI 1/?</div>
            <div class="vocab-vn" id="word-vn">Đang chờ Admin gửi câu hỏi...</div>
            <div class="vocab-en" id="word-en">Loading...</div>
        </div>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-t1" onclick="updateScore(1, 1)">ĐỎ ĐÚNG (+1)</button>
            <button class="btn btn-t1" onclick="updateScore(1, -1)" style="background: #475569; box-shadow: 0 5px 0 #334155;">PHẠT (-1)</button>
        </div>
        <button class="btn btn-reveal" id="btn-reveal" onclick="revealAnswer()"><i class="fa-solid fa-eye"></i> HIỆN ĐÁP ÁN</button>
        <button class="btn btn-reveal" id="btn-next" onclick="nextWord()" style="display: none; background: #10b981; box-shadow: 0 5px 0 #047857;"><i class="fa-solid fa-forward"></i> CÂU TIẾP THEO</button>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-t2" onclick="updateScore(2, -1)" style="background: #475569; box-shadow: 0 5px 0 #334155;">PHẠT (-1)</button>
            <button class="btn btn-t2" onclick="updateScore(2, 1)">XANH ĐÚNG (+1)</button>
        </div>
    </div>

    <div id="win-popup" class="popup">
        <div id="final-stats" style="color: #94a3b8; font-size: 24px; margin-bottom: 20px; font-weight: 800;"></div>
        <h1 class="win-title" id="win-text">TEAM ĐỎ THẮNG!</h1>
        <button class="btn btn-reveal" style="margin-top: 40px;" onclick="location.reload()">Trận mới</button>
    </div>

    <script>
        let questions = [];
        let currentIndex = 0;
        let score1 = 0, score2 = 0, pullDiff = 0;
        let MAX_PULL = 5; // Sẽ được cập nhật từ Admin

        const flag = document.getElementById('flag');
        const vnWord = document.getElementById('word-vn');
        const enWord = document.getElementById('word-en');
        const qCounter = document.getElementById('q-count-display');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function loadFromAdmin() {
            const data = localStorage.getItem('mhent_tug_cmd');
            if (data) {
                const cmd = JSON.parse(data);
                questions = cmd.payload.questions;
                MAX_PULL = cmd.payload.winningPoints;
                currentIndex = 0; score1 = 0; score2 = 0; pullDiff = 0;
                updateUI(); loadQuestion();
            }
        }
        window.addEventListener('storage', (e) => { if (e.key === 'mhent_tug_cmd') loadFromAdmin(); });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                determineFinalWinner(); // Hết câu hỏi -> Kiểm tra cờ đang ở đâu
                return;
            }
            qCounter.innerText = `CÂU HỎI ${currentIndex + 1}/${questions.length}`;
            vnWord.innerText = questions[currentIndex].q;
            enWord.innerText = questions[currentIndex].a;
            enWord.classList.remove('show');
            document.getElementById('btn-reveal').style.display = 'block';
            document.getElementById('btn-next').style.display = 'none';
        }

        function updateScore(team, pts) {
            initAudio();
            if (team === 1) { score1 += pts; pullDiff -= pts; } 
            else { score2 += pts; pullDiff += pts; }
            if(score1 < 0) score1 = 0; if(score2 < 0) score2 = 0;
            updateUI();
            checkInstantWin(); // Kiểm tra xem đã đạt n điểm lệch chưa
        }

        function updateUI() {
            document.getElementById('score-1').innerText = score1;
            document.getElementById('score-2').innerText = score2;
            let movePercent = (pullDiff / MAX_PULL) * 42; 
            if (movePercent < -42) movePercent = -42;
            if (movePercent > 42) movePercent = 42;
            flag.style.transform = `translate(calc(-50% + ${movePercent}vw), -50%) rotate(${pullDiff * 3}deg)`;
        }

        function checkInstantWin() {
            if (pullDiff <= -MAX_PULL) showWin("TEAM ĐỎ ĐÃ KÉO SẬP HẦM!", "t1-color");
            else if (pullDiff >= MAX_PULL) showWin("TEAM XANH ĐÃ KÉO SẬP HẦM!", "t2-color");
        }

        function determineFinalWinner() {
            document.getElementById('final-stats').innerText = `TỈ SỐ CHUNG CUỘC: ${score1} - ${score2}`;
            if (pullDiff < 0) showWin("HẾT CÂU HỎI: TEAM ĐỎ THẮNG THUYẾT PHỤC!", "t1-color");
            else if (pullDiff > 0) showWin("HẾT CÂU HỎI: TEAM XANH THẮNG THUYẾT PHỤC!", "t2-color");
            else showWin("HẾT CÂU HỎI: TRẬN CHIẾN BẤT PHÂN THẮNG BẠI!", "white");
        }

        function showWin(txt, cls) {
            document.getElementById('win-text').innerText = txt;
            document.getElementById('win-text').className = "win-title " + cls;
            document.getElementById('win-popup').classList.add('show');
        }

        function revealAnswer() { initAudio(); enWord.classList.add('show'); document.getElementById('btn-reveal').style.display = 'none'; document.getElementById('btn-next').style.display = 'block'; }
        function nextWord() { currentIndex++; loadQuestion(); }

        loadFromAdmin();
    </script>
    <script>
    // CHIP NHẬN DỮ LIỆU (TUG OF WAR)
    document.addEventListener("DOMContentLoaded", async () => {
        const gameId = new URLSearchParams(window.location.search).get('id');
        if (gameId) {
            try {
                let res = await fetch("https://script.google.com/macros/s/AKfycbz2D9oAH4Q21Xf9NZls3J2Ojh7jCZB_H6iIg9dISJaBF79GXiJNr7AwFi819Rt_kctaeQ/exec", { method: 'POST', body: JSON.stringify({ action: 'getGameById', gameType: 'tug', rowId: gameId }) });
                let result = await res.json();
                if (result.success) {
                    questions = result.gameData.qaList;
                    MAX_PULL = result.gameData.winN || 5;
                    currentIndex = 0; score1 = 0; score2 = 0; pullDiff = 0;
                    updateUI(); loadQuestion();
                    showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                }
            } catch(e) { console.error(e); }
        }
    });
    </script>
    <script src="/mhent-ui.js"></script>
    <script src="/check-token.js"></script>
</body>
</html>
