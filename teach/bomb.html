<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Bomb - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css"> 
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --panel-bg: #1e293b; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg-dark); color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; transition: background-color 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--panel-bg); border-bottom: 2px solid #334155; z-index: 10; }
        .header h1 { margin: 0; color: #ef4444; font-size: 24px; text-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .arena { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px; box-sizing: border-box;}

        /* CSS TỐI ƯU HÓA MÀN HÌNH NHỎ (DÙNG CLAMP VÀ VH) */
        .question-box {
            background: rgba(30, 41, 59, 0.95); border: 3px solid #3b82f6; border-radius: 20px;
            padding: min(25px, 3vh) min(40px, 4vw); font-size: clamp(20px, 3vh, 28px); font-weight: 900; text-align: center;
            max-width: 80%; margin-bottom: min(40px, 3vh); box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: none; color: #f8fafc; z-index: 5;
            animation: fadeInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transition: 0.3s;
        }
        .question-box span { color: #f59e0b; font-size: clamp(14px, 2vh, 18px); display: block; margin-bottom: 1vh; text-transform: uppercase; letter-spacing: 3px;}
        @keyframes fadeInDown { from {opacity:0; transform: translateY(-30px) scale(0.9);} to {opacity:1; transform: translateY(0) scale(1);} }

        .status-badge { font-size: clamp(20px, 3vh, 28px); font-weight: 900; padding: min(15px, 2vh) min(40px, 4vw); border-radius: 50px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: min(30px, 3vh); transition: 0.3s; background: #334155; color: #fff; border: 4px solid #475569; }
        
        .bomb-container { position: relative; text-align: center; }
        .bomb-icon { font-size: clamp(120px, 20vh, 180px); color: #334155; transition: 0.3s; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); }
        .bomb-icon.active { color: #1e293b; }
        .timer-display { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); font-family: monospace; font-size: clamp(30px, 5vh, 45px); font-weight: 900; color: #ef4444; background: #000; padding: 5px 15px; border-radius: 10px; border: 3px solid #333; text-shadow: 0 0 10px #ef4444; letter-spacing: 3px; }
        
        .reward-popup { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); color: #10b981; font-size: 40px; font-weight: 900; opacity: 0; pointer-events: none; }
        .reward-anim { animation: floatUp 0.8s ease-out; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -100px); } }

        .setup-panel { position: absolute; display: flex; flex-direction: column; gap: 15px; background: var(--panel-bg); padding: 30px; border-radius: 20px; border: 2px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 20; text-align: center; width: 380px; transition: 0.3s; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .input-group label { font-weight: bold; color: #94a3b8; }
        .setup-panel input { font-size: 20px; text-align: center; padding: 8px; width: 80px; border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: white; font-family: 'Nunito', sans-serif; font-weight: 900; outline: none; }

        .btn { padding: min(15px, 2vh) min(30px, 3vw); font-size: clamp(16px, 2.5vh, 20px); font-weight: 900; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; color: white; font-family: 'Nunito'; text-transform: uppercase; }
        .btn-start { background: #10b981; box-shadow: 0 6px 0 #047857; margin-top: 10px; }
        .btn-pass { background: #f59e0b; box-shadow: 0 8px 0 #b45309; font-size: clamp(22px, 3.5vh, 30px); padding: min(20px, 2vh) min(60px, 5vw); margin-top: min(40px, 3vh); display: none; }
        .btn-reset { background: #64748b; box-shadow: 0 6px 0 #475569; margin-top: min(20px, 2vh); display: none;}
        .btn-next-round { background: #3b82f6; box-shadow: 0 6px 0 #1d4ed8; margin-top: min(20px, 2vh); display: none; font-size: clamp(18px, 3vh, 24px); padding: min(15px, 2vh) min(50px, 4vw); }

        .panic { animation: panic-shake 0.2s infinite; color: #ef4444 !important; filter: drop-shadow(0 0 50px rgba(239, 68, 68, 0.8)); }
        @keyframes panic-shake { 0% { transform: translate(0, 0) scale(1.1); } 50% { transform: translate(5px, 5px) scale(1.1); } 100% { transform: translate(0, 0) scale(1.1); } }
        body.exploded { animation: explode-screen 1s ease-out; }
        @keyframes explode-screen { 0% { background-color: #ffffff; } 10% { background-color: #ef4444; } 100% { background-color: var(--bg-dark); } }
        
        /* ĐÃ THU NHỎ SIZE CỦA 2 CÁI ICON KHỔNG LỒ NÀY */
        .explosion-icon { font-size: clamp(140px, 25vh, 250px); color: #f59e0b; display: none; filter: drop-shadow(0 0 100px #ef4444); animation: pop-out 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .safe-icon { font-size: clamp(140px, 25vh, 250px); color: #10b981; display: none; filter: drop-shadow(0 0 100px #10b981); animation: pop-out 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop-out { 0% { transform: scale(0); opacity: 0; } 50% {transform: scale(1.1);} 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bomb"></i> Time Bomb - MHEnt. Edu</h1>
        <div style="color: #94a3b8; font-weight: bold;"><i class="fa-solid fa-keyboard"></i> Phím tắt: SPACE để thao tác</div>
    </div>

    <div class="arena">
        
        <div class="setup-panel" id="setup-panel">
            <div style="background: #0f172a; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #3b82f6;">
                <span id="sync-status" style="color: #3b82f6; font-weight: bold; font-size: 14px;"><i class="fa-solid fa-wifi"></i> Đang chờ lệnh từ Admin...</span>
            </div>
            <div style="color: #ef4444; font-weight: 900; margin-bottom: 10px;" id="mode-display">CHẾ ĐỘ: CHUYỀN BOM</div>
            <div class="input-group">
                <label>Thời gian (Giây):</label>
                <input type="number" id="time-input" value="30" min="5">
            </div>
            <button class="btn btn-start" onclick="startGame()"><i class="fa-solid fa-play"></i> BẮT ĐẦU</button>
        </div>

        <div class="question-box" id="question-box">
            <span id="q-counter">CÂU HỎI 1/5</span>
            <div id="q-text">Nội dung câu hỏi sẽ hiện ở đây...</div>
        </div>

        <div class="status-badge" id="status-badge">Bom chưa kích hoạt</div>

        <div class="bomb-container" id="bomb-container">
            <div class="reward-popup" id="reward-popup">+2s</div>
            <i class="fa-solid fa-bomb bomb-icon" id="bomb-icon"></i>
            <div class="timer-display" id="timer-display">00.00</div>
            
            <i class="fa-solid fa-burst explosion-icon" id="explosion-icon"></i>
            <i class="fa-solid fa-shield-heart safe-icon" id="safe-icon"></i>
        </div>

        <button class="btn btn-pass" id="btn-action" onclick="handleAction()">CHUYỂN BOM <i class="fa-solid fa-angles-right"></i></button>
        <button class="btn btn-next-round" id="btn-next" onclick="nextRound()">CÂU TIẾP THEO <i class="fa-solid fa-forward"></i></button>
        <button class="btn btn-reset" id="btn-reset" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> VỀ MÀN HÌNH CHỜ</button>
    </div>

    <script>
        let configTime = 30; // Thời gian gốc để reset
        let timeLeft = 0;
        let timerInterval = null;
        let currentTeam = 1;
        let numTeams = 2;
        let timeReward = 0;
        let isPlaying = false;
        let gameMode = 'pass'; // 'pass' hoặc 'defuse'

        let questionsList = [];
        let currentQIndex = 0;

        const teamColors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#71717a', '#a855f7'];

        const timerDisplay = document.getElementById('timer-display');
        const bombIcon = document.getElementById('bomb-icon');
        const explosionIcon = document.getElementById('explosion-icon');
        const safeIcon = document.getElementById('safe-icon');
        const statusBadge = document.getElementById('status-badge');
        const setupPanel = document.getElementById('setup-panel');
        const btnAction = document.getElementById('btn-action');
        const btnNext = document.getElementById('btn-next');
        const btnReset = document.getElementById('btn-reset');
        const rewardPopup = document.getElementById('reward-popup');
        const qBox = document.getElementById('question-box');
        const qCounter = document.getElementById('q-counter');
        const qText = document.getElementById('q-text');

        // ==========================================
        // LẮNG NGHE LỆNH TỪ ADMIN
        // ==========================================
        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_bomb_cmd') {
                const data = JSON.parse(e.newValue);
                if (data.action === 'SYNC') {
                    document.getElementById('time-input').value = data.payload.time;
                    numTeams = data.payload.teams;
                    timeReward = data.payload.reward;
                    gameMode = data.payload.mode || 'pass';
                    questionsList = data.payload.questions || [];
                    
                    document.getElementById('mode-display').innerText = gameMode === 'pass' ? "CHẾ ĐỘ: 🔥 CHUYỀN BOM" : "CHẾ ĐỘ: 🛡️ GỠ BOM";

                    setupPanel.style.borderColor = '#10b981';
                    document.getElementById('sync-status').innerHTML = `<i class="fa-solid fa-check-double"></i> Đã nhận cấu hình (${questionsList.length} câu hỏi)!`;
                    document.getElementById('sync-status').style.color = '#10b981';
                    setTimeout(() => {
                        setupPanel.style.borderColor = '#334155';
                        document.getElementById('sync-status').style.color = '#3b82f6';
                        document.getElementById('sync-status').innerHTML = `<i class="fa-solid fa-wifi"></i> Đang chờ lệnh từ Admin...`;
                    }, 3000);
                }
            }
        });

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playPass() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosion() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        function playVictory() {
            if (!audioCtx) return;
            const freqs = [440, 554.37, 659.25, 880]; 
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
                gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.15 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.15); osc.stop(audioCtx.currentTime + i * 0.15 + 0.5);
            });
        }

        function formatTime(s) { return (s < 10 ? "0" : "") + s + ".00"; }

        function startGame() {
            initAudio();
            configTime = parseInt(document.getElementById('time-input').value) || 30;
            timeLeft = configTime;
            
            currentTeam = 1;
            currentQIndex = 0;
            isPlaying = true;

            // Xử lý hiện câu hỏi
            if(questionsList.length > 0) {
                qBox.style.display = 'block';
                qBox.style.opacity = '1';
                qCounter.innerText = `CÂU HỎI 1/${questionsList.length}`;
                qText.innerText = questionsList[0];
            } else {
                qBox.style.display = 'none';
            }

            // Giao diện nút bấm theo chế độ
            btnAction.style.display = 'block';
            if (gameMode === 'defuse') {
                btnAction.innerHTML = `GỠ BOM AN TOÀN <i class="fa-solid fa-shield-heart"></i>`;
                btnAction.style.background = '#10b981'; // Màu xanh lá
                btnAction.style.boxShadow = '0 8px 0 #047857';
            } else {
                btnAction.innerHTML = `CHUYỂN BOM <i class="fa-solid fa-angles-right"></i>`;
                btnAction.style.background = '#f59e0b';
                btnAction.style.boxShadow = '0 8px 0 #b45309';
            }

            setupPanel.style.display = 'none';
            bombIcon.classList.add('active');
            timerDisplay.innerText = formatTime(timeLeft);
            
            updateTeamUI();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);
                playTick();

                if (timeLeft <= 10 && timeLeft > 0) {
                    bombIcon.classList.add('panic');
                    timerDisplay.style.color = '#fff';
                }

                if (timeLeft <= 0) explodeBomb();
            }, 1000);
        }

        // HÀM TỔNG XỬ LÝ KHI BẤM SPACE
        function handleAction() {
            if(!isPlaying) return;
            if (gameMode === 'pass') {
                passBomb();
            } else if (gameMode === 'defuse') {
                defuseBomb();
            }
        }

        // =====================================
        // CHẾ ĐỘ 1: CHUYỀN BOM (CŨ)
        // =====================================
        function passBomb() {
            if(questionsList.length > 0) {
                currentQIndex++;
                if(currentQIndex >= questionsList.length) {
                    safeVictory(); 
                    return;
                } else {
                    qBox.style.animation = 'none';
                    void qBox.offsetWidth; 
                    qBox.style.animation = 'fadeInDown 0.3s ease-out';
                    qCounter.innerText = `CÂU HỎI ${currentQIndex + 1}/${questionsList.length}`;
                    qText.innerText = questionsList[currentQIndex];
                }
            }

            playPass();
            
            if(timeReward > 0) {
                timeLeft += timeReward;
                timerDisplay.innerText = formatTime(timeLeft);
                showRewardPopup();
                if(timeLeft > 10) {
                    bombIcon.classList.remove('panic');
                    timerDisplay.style.color = '#ef4444';
                }
            }

            currentTeam = (currentTeam % numTeams) + 1;
            updateTeamUI();
            
            bombIcon.style.transform = 'scale(1.2)';
            setTimeout(() => { bombIcon.style.transform = ''; }, 150);
        }

        // =====================================
        // CHẾ ĐỘ 2: GỠ BOM (MỚI)
        // =====================================
        function defuseBomb() {
            clearInterval(timerInterval);
            isPlaying = false;
            playVictory(); // Âm thanh nhẹ nhõm

            btnAction.style.display = 'none';
            bombIcon.style.display = 'none';
            timerDisplay.style.display = 'none';
            safeIcon.style.display = 'block';

            statusBadge.style.background = '#10b981';
            statusBadge.style.color = 'white';
            statusBadge.style.borderColor = '#fff';
            statusBadge.innerText = `🎉 GỠ BOM THÀNH CÔNG!`;

            // Kiểm tra xem còn câu hỏi không
            if (questionsList.length > 0 && currentQIndex < questionsList.length - 1) {
                btnNext.style.display = 'block';
            } else {
                btnReset.style.display = 'block'; // Hết câu thì chỉ cho Reset
                if(questionsList.length > 0) qCounter.innerText = "HOÀN THÀNH TẤT CẢ!";
            }
        }

        // CÂU TIẾP THEO (Dành cho chế độ Gỡ Bom)
        function nextRound() {
            currentTeam = (currentTeam % numTeams) + 1; // Chuyển lượt
            currentQIndex++;
            
            btnNext.style.display = 'none';
            safeIcon.style.display = 'none';
            explosionIcon.style.display = 'none';
            document.body.classList.remove('exploded');
            qBox.style.opacity = '1';

            bombIcon.style.display = 'inline-block';
            timerDisplay.style.display = 'block';
            bombIcon.classList.remove('active', 'panic');
            timerDisplay.style.color = '#ef4444';
            btnAction.style.display = 'block';

            // Reset thời gian
            timeLeft = configTime;
            timerDisplay.innerText = formatTime(timeLeft);
            
            // Cập nhật câu hỏi
            qBox.style.animation = 'none';
            void qBox.offsetWidth; 
            qBox.style.animation = 'fadeInDown 0.3s ease-out';
            qCounter.innerText = `CÂU HỎI ${currentQIndex + 1}/${questionsList.length}`;
            qText.innerText = questionsList[currentQIndex];

            updateTeamUI();
            isPlaying = true;
            startTimer();
        }

        // =====================================
        // UI & KẾT THÚC
        // =====================================
        function showRewardPopup() {
            rewardPopup.innerText = `+${timeReward}s`;
            rewardPopup.classList.remove('reward-anim');
            void rewardPopup.offsetWidth; 
            rewardPopup.classList.add('reward-anim');
        }

        function updateTeamUI() {
            const color = teamColors[(currentTeam - 1) % teamColors.length];
            statusBadge.style.borderColor = color;
            statusBadge.style.boxShadow = `0 0 30px ${color}66`; 
            statusBadge.style.background = `${color}33`;
            statusBadge.style.color = color;
            
            if (gameMode === 'pass') {
                statusBadge.innerText = `Đang giữ bom: TEAM ${currentTeam}`;
                btnAction.style.background = color;
                btnAction.style.boxShadow = `0 8px 0 ${color}aa`;
            } else {
                statusBadge.innerText = `Lượt của: TEAM ${currentTeam}`;
            }
        }

        function explodeBomb() {
            clearInterval(timerInterval);
            isPlaying = false;
            playExplosion();

            qBox.style.opacity = '0.3'; 
            btnAction.style.display = 'none';
            bombIcon.style.display = 'none';
            timerDisplay.style.display = 'none';
            explosionIcon.style.display = 'block';
            document.body.classList.add('exploded');
            
            statusBadge.style.background = '#ef4444';
            statusBadge.style.color = 'white';
            statusBadge.style.borderColor = '#fff';
            statusBadge.innerText = `💥 BÙMMM! TEAM ${currentTeam} THẤT BẠI!`;

            // Nếu chơi Gỡ bom mà nổ, cho phép qua câu tiếp theo
            if (gameMode === 'defuse' && questionsList.length > 0 && currentQIndex < questionsList.length - 1) {
                btnNext.style.display = 'block';
            } else {
                btnReset.style.display = 'block';
            }
        }

        function safeVictory() {
            clearInterval(timerInterval);
            isPlaying = false;
            playVictory();

            btnAction.style.display = 'none';
            btnReset.style.display = 'block';
            bombIcon.style.display = 'none';
            timerDisplay.style.display = 'none';
            safeIcon.style.display = 'block';
            
            qBox.style.borderColor = '#10b981';
            qBox.style.background = 'rgba(16, 185, 129, 0.2)';
            qCounter.innerText = "NHIỆM VỤ HOÀN THÀNH";
            qCounter.style.color = '#fff';
            qText.innerText = "Toàn bộ câu hỏi đã được giải mã!";

            statusBadge.style.background = '#10b981';
            statusBadge.style.color = 'white';
            statusBadge.style.borderColor = '#fff';
            statusBadge.style.boxShadow = '0 0 50px rgba(16,185,129,0.8)';
            statusBadge.innerText = `🎉 XUẤT SẮC! GỠ BOM THÀNH CÔNG! 🎉`;
        }

        function resetGame() {
            document.body.classList.remove('exploded');
            setupPanel.style.display = 'flex';
            btnReset.style.display = 'none';
            btnNext.style.display = 'none';
            bombIcon.style.display = 'inline-block';
            timerDisplay.style.display = 'block';
            explosionIcon.style.display = 'none';
            safeIcon.style.display = 'none';
            
            qBox.style.display = 'none';
            qBox.style.opacity = '1';
            qBox.style.borderColor = '#3b82f6';
            qBox.style.background = 'rgba(30, 41, 59, 0.95)';
            qCounter.style.color = '#f59e0b';

            bombIcon.classList.remove('active', 'panic');
            timerDisplay.style.color = '#ef4444';
            statusBadge.style = ""; 
            statusBadge.innerText = "Bom chưa kích hoạt";
            clearInterval(timerInterval);
        }

        document.addEventListener('keydown', (e) => { if (e.code === 'Space' && isPlaying) { e.preventDefault(); handleAction(); } });
    </script>
    <script>
    // =========================================================
    // 🚀 AUTO-LOADER: TỰ ĐỘNG TẢI GAME TỪ LINK GIÁO ÁN
    // =========================================================
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');
        
        // Tự động phân tích xem mình đang ở trang game nào (baam, tug, bomb...)
        const pathParts = window.location.pathname.split('/');
        let gameType = pathParts[pathParts.length - 1].replace('.html', '');
        if(!gameType || gameType === 'teach') gameType = 'index'; // Fallback

        if (gameId && gameType) {
            const waitingMsg = document.getElementById('waiting-msg');
            if(waitingMsg) waitingMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><br><br>Đang tải giáo án từ Két sắt Đám Mây...';
            
            try {
                const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2D9oAH4Q21Xf9NZls3J2Ojh7jCZB_H6iIg9dISJaBF79GXiJNr7AwFi819Rt_kctaeQ/exec";
                let res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getGameById', gameType: gameType, rowId: gameId })
                });
                let result = await res.json();
                
                if (result.success) {
                    const payload = result.gameData;
                    
                    // KIỂM TRA TỪNG LOẠI GAME ĐỂ KHỞI ĐỘNG CHO ĐÚNG CÁCH
                    if (gameType === 'baam') {
                        initGame(payload.teams, payload.cards);
                        showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                    } 
                    else if (gameType === 'blast') {
                        questions = payload.questions; 
                        currentIndex = 0; 
                        document.getElementById('waiting-msg').style.display = 'none';
                        document.querySelector('.game-container').style.display = 'flex'; // Hiện game
                        loadQuestion();
                        showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                    }
                    else if (gameType === 'tug') {
                        questions = payload.qaList;
                        MAX_PULL = payload.winN || 5;
                        currentIndex = 0; score1 = 0; score2 = 0; pullDiff = 0;
                        document.getElementById('waiting-msg').style.display = 'none';
                        updateUI(); loadQuestion();
                        showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                    }
                    else if (gameType === 'bomb') {
                        // Logic của Bomb
                        document.getElementById('time-input').value = payload.time || 30;
                        numTeams = payload.teams || 2;
                        timeReward = payload.reward || 0;
                        gameMode = payload.mode || 'pass';
                        questionsList = payload.questions || [];
                        document.getElementById('mode-display').innerText = gameMode === 'pass' ? "CHẾ ĐỘ: 🔥 CHUYỀN BOM" : "CHẾ ĐỘ: 🛡️ GỠ BOM";
                        showToast("Sẵn sàng!", `Giáo án: ${result.dataName} đã được nạp!`, "success");
                    }
                    else if (gameType === 'spinner') {
                        // Cần nhét data vào mảng của Spinner
                        activeItems = payload.items.map((name, index) => ({ id: index, name: name }));
                        isRigged = payload.isRigged;
                        riggedOrder = payload.riggedOrder || [];
                        riggedStep = 0;
                        document.getElementById('waiting-msg').style.display = 'none';
                        resetWheelPos();
                        showToast("Sẵn sàng!", `Danh sách quay đã được nạp!`, "success");
                    }

                } else {
                    if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><br><br>Lỗi: Không tìm thấy giáo án này!`;
                }
            } catch(e) {
                if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-wifi"></i><br><br>Lỗi mạng rồi cậu ơi!`;
            }
        }
    });
    </script>
    <script src="/mhent-ui.js"></script>
</body>
</html>
