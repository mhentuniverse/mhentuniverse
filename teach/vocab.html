<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Display - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .present-header { text-align: center; padding: 20px; }
        #present-status { font-size: 32px; font-weight: 900; color: var(--hub-color); min-height: 40px; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);}
        
        .present-board { flex: 1; padding: 20px 50px; display: flex; flex-direction: column; justify-content: center; }
        .word-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .word-card { background: #1e293b; border: 3px solid #334155; padding: 30px 20px; border-radius: 15px; font-size: 36px; font-weight: 900; color: white; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; text-align: center; user-select: none; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        
        .word-card.correct { background: #10b981 !important; border-color: #059669 !important; transform: scale(1.05); }
        .word-card.incorrect { background: #ef4444 !important; border-color: #b91c1c !important; opacity: 0.8; pointer-events: none; }
        .word-card.disabled { pointer-events: none; }
        
        /* CHẾ ĐỘ CHALLENGE */
        .word-card.covered { background: #0f172a; border-color: #1e293b; color: transparent; background-image: repeating-linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b), repeating-linear-gradient(45deg, #1e293b 25%, #0f172a 25%, #0f172a 75%, #1e293b 75%, #1e293b); background-position: 0 0, 15px 15px; background-size: 30px 30px; box-shadow: none; pointer-events: auto !important;}
        .word-card.revealed-temp { background: #f59e0b; color: white; border-color: #d97706; pointer-events: auto; transform: scale(1.05); box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }

        #waiting-msg { text-align: center; font-size: 30px; color: #64748b; font-weight: 800; margin-top: 150px; }
    </style>
</head>
<body>

    <div id="waiting-msg"><i class="fa-solid fa-satellite-dish fa-beat"></i><br><br>Đang chờ kết nối từ Máy tính Giáo viên...</div>

    <div id="game-container" style="display: none; height: 100%; flex-direction: column;">
        <div class="present-header"><div id="present-status">SẴN SÀNG! LẮNG NGHE GIÁO VIÊN!</div></div>
        <div class="present-board"><div class="word-grid" id="present-grid"></div></div>
    </div>

    <script>
        function sendCmd(action, payload) { localStorage.setItem('mhent_edu_cmd', JSON.stringify({ action, payload, rand: Math.random() })); }

        let globalMode = 'normal', globalStrikes = 0, targetWord = null, strikesCurrent = 0, isQuestionActive = false, challengeTimer = null;

        window.addEventListener('storage', e => {
            if(e.key !== 'mhent_edu_cmd') return;
            const data = JSON.parse(e.newValue);
            if(data.action === 'SYNC_DATA') { 
                globalMode = data.payload.mode; globalStrikes = data.payload.strikes;
                document.getElementById('waiting-msg').style.display = 'none'; document.getElementById('game-container').style.display = 'flex';
                renderGrid(data.payload.order);
            }
            if(data.action === 'SHUFFLE') renderGrid(data.payload);
            if(data.action === 'SET_QUESTION') loadQuestion(data.payload);
            if(data.action === 'ADMIN_CLICK') {
                const card = document.querySelector(`.word-card[data-id="${data.payload}"]`);
                if(card) handleClick(card, data.payload);
            }
        });

        function renderGrid(order) {
            const grid = document.getElementById('present-grid'); grid.innerHTML = '';
            order.forEach(item => {
                const card = document.createElement('div'); card.className = 'word-card'; card.innerText = item.word; card.dataset.id = item.id;
                card.onclick = () => handleClick(card, item.id);
                grid.appendChild(card);
            });
            applyFog();
        }

        function loadQuestion(payload) {
            targetWord = payload; strikesCurrent = 0; isQuestionActive = true;
            document.getElementById('present-status').innerText = "HÃY TÌM TỪ CHÍNH XÁC!"; document.getElementById('present-status').style.color = "var(--hub-color)";
            
            // 🔥 CHÌA KHÓA Ở ĐÂY: Mọi thẻ đều bị xóa sạch trạng thái đúng/sai, trở lại thành "đạn mù" bình đẳng!
            document.querySelectorAll('.word-card').forEach(card => card.classList.remove('incorrect', 'correct', 'disabled'));
            applyFog();
        }

        function handleClick(card, selectedId) {
            if(!isQuestionActive || card.classList.contains('disabled')) return;
            card.classList.remove('covered');

            if(selectedId === targetWord.id) { // ĐÚNG
                clearInterval(challengeTimer);
                if(globalMode === 'challenge') document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp'));
                
                card.classList.add('correct'); isQuestionActive = false;
                document.getElementById('present-status').innerText = "🎉 XUẤT SẮC!"; document.getElementById('present-status').style.color = "#10b981";
                document.querySelectorAll('.word-card').forEach(c => c.classList.add('disabled'));

                sendCmd('SYNC_COLOR', { id: selectedId, status: 'correct' });
                sendCmd('REPORT_SOLVED', targetWord); // Báo về cho Admin gạch chéo câu hỏi
            } else { // SAI
                card.classList.add('incorrect', 'disabled'); strikesCurrent++;
                sendCmd('SYNC_COLOR', { id: selectedId, status: 'incorrect' });

                if(strikesCurrent > globalStrikes) { // HẾT MẠNG
                    clearInterval(challengeTimer);
                    if(globalMode === 'challenge') document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp'));
                    
                    document.querySelector(`.word-card[data-id="${targetWord.id}"]`).classList.add('correct');
                    sendCmd('SYNC_COLOR', { id: targetWord.id, status: 'correct' });
                    
                    isQuestionActive = false;
                    document.getElementById('present-status').innerText = "RẤT TIẾC! HẾT LƯỢT CHỌN!"; document.getElementById('present-status').style.color = "#ef4444";
                    document.querySelectorAll('.word-card').forEach(c => c.classList.add('disabled'));
                    sendCmd('REPORT_SOLVED', targetWord);
                } else {
                    document.getElementById('present-status').innerText = `SAI RỒI! CÒN ${globalStrikes - strikesCurrent + 1} LƯỢT!`;
                    document.getElementById('present-status').style.color = "#f59e0b";
                }
            }
        }

        function applyFog() {
            clearInterval(challengeTimer);
            if(globalMode !== 'challenge' || !isQuestionActive) { document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp')); return; }

            // Không còn lọc solved-past nữa, TẤT CẢ đều bị sương mù che phủ
            const cards = Array.from(document.querySelectorAll('.word-card'));
            cards.forEach(c => c.classList.add('covered'));

            challengeTimer = setInterval(() => {
                if(!isQuestionActive) { clearInterval(challengeTimer); return; }
                cards.forEach(c => c.classList.remove('revealed-temp'));
                
                const available = cards.filter(c => !c.classList.contains('incorrect'));
                if(available.length > 0) {
                    let num = Math.max(1, Math.round(available.length / 5));
                    available.sort(() => 0.5 - Math.random()).slice(0, num).forEach(c => c.classList.add('revealed-temp'));
                }
            }, 1500);
        }
    </script>
    <script>
    // =========================================================
    // 🚀 CHIP NHẬN DỮ LIỆU TỪ MÂY: ĐẤU TRƯỜNG TỪ VỰNG (VOCAB)
    // =========================================================
    document.addEventListener("DOMContentLoaded", async () => {
        const gameId = new URLSearchParams(window.location.search).get('id');
        
        if (gameId) {
            const waitingMsg = document.getElementById('waiting-msg');
            if(waitingMsg) waitingMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><br><br>Đang tải giáo án từ Két sắt Đám Mây...';
            
            try {
                const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2D9oAH4Q21Xf9NZls3J2Ojh7jCZB_H6iIg9dISJaBF79GXiJNr7AwFi819Rt_kctaeQ/exec";
                let res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getGameById', gameType: 'vocab', rowId: gameId })
                });
                let result = await res.json();
                
                if (result.success) {
                    const payload = result.gameData;
                    
                    // Nạp dữ liệu vào biến toàn cục của Vocab
                    globalMode = payload.mode || 'normal';
                    globalStrikes = payload.strikes || 1;
                    
                    // Tạo một trật tự xáo trộn cho mảng từ vựng lấy từ Đám mây
                    const shuffledOrder = [...(payload.globalWordList || [])].sort(() => 0.5 - Math.random());
                    
                    document.getElementById('waiting-msg').style.display = 'none'; 
                    document.getElementById('game-container').style.display = 'flex';
                    
                    // Vẽ lưới từ vựng ra màn hình
                    renderGrid(shuffledOrder);
                    
                    showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");

                } else {
                    if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i><br><br>Lỗi: Không tìm thấy giáo án này!`;
                }
            } catch(e) {
                if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-wifi"></i><br><br>Lỗi mạng rồi cậu ơi!`;
            }
        }
    });
    </script>
    <script src="/mhent-ui.js"></script>
    <script src="/check-token.js"></script>
    <script type="module" src="/maintenance.js"></script>
</body>
</html>
