<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unscramble Sentences - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css"> 
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #0f172a; color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        #waiting-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 30px; color: #64748b; font-weight: 800; }

        #main-game { display: none; height: 100vh; flex-direction: column; width: 100%; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #1e293b; border-bottom: 2px solid #334155; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10; }
        .header h1 { margin: 0; font-size: 24px; color: #0ea5e9; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        
        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-game { padding: 10px 20px; border-radius: 12px; font-weight: 800; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; font-family: 'Nunito'; color: white; }
        .btn-shuffle { background: linear-gradient(135deg, #ef4444, #f43f5e); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .btn-reveal { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .btn-nav { background: #334155; color: white; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .btn-game:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-game:active { transform: translateY(1px); }

        .speed-control { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 5px 15px; border-radius: 20px; border: 1px solid #475569; }
        .speed-control input[type="range"] { accent-color: #0ea5e9; cursor: pointer; }

        .arena { flex: 1; position: relative; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); overflow: hidden; }
        
        /* 🔥 CẤU CẤU LẠI CSS ĐỂ NHẬN ĐA MÀU SẮC */
        .word-block { 
            position: absolute; top: 0; left: 0; padding: 15px 25px; 
            font-size: 28px; font-weight: 900; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.2); 
            border: 2px solid rgba(255, 255, 255, 0.3); /* Viền mờ mặc định */
            user-select: none; white-space: nowrap;
            transform-origin: center center;
            color: white; /* Mặc định chữ trắng */
        }

        /* 🌈 6 LỚP MÀU ĐẠI DIỆN CHO 6 CON NGƯỜI CỦA CÔNG TY */
        .block-turquoise { background: linear-gradient(135deg, #2dd4bf, #14b8a6); border-color: #5eead4; }
        .block-pink { background: linear-gradient(135deg, #f472b6, #db2777); border-color: #f9a8d4; }
        .block-yellow { background: linear-gradient(135deg, #facc15, #f59e0b); border-color: #fbef7e; color: #1e293b; } /* Chữ tối màu cho dễ đọc */
        .block-purple { background: linear-gradient(135deg, #c084fc, #9333ea); border-color: #d8b4fe; }
        .block-silver { background: linear-gradient(135deg, #e2e8f0, #cbd5e1); border-color: #f1f5f9; color: #1e293b; } /* Chữ tối màu cho dễ đọc */
        .block-lightblue { background: linear-gradient(135deg, #38bdf8, #0ea5e9); border-color: #7dd3fc; }

        .sentence-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.8); padding: 5px 20px; border-radius: 20px; font-weight: 800; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="waiting-msg"><i class="fa-solid fa-hurricane fa-spin"></i><br><br>Waiting for connection...</div>

    <div id="main-game">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="/teach/admin" style="color: #94a3b8; font-size: 24px; transition: 0.2s;"><i class="fa-solid fa-circle-arrow-left"></i></a>
                <h1><i class="fa-solid fa-hurricane"></i> Word Tornado</h1>
            </div>
            
            <div class="controls">
                <button class="btn-game btn-nav" onclick="prevSentence()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="btn-game btn-nav" onclick="nextSentence()"><i class="fa-solid fa-forward-step"></i></button>
                
                <div class="speed-control">
                    <i class="fa-solid fa-gauge-high" style="color: #0ea5e9;"></i>
                    <input type="range" id="speed-slider" min="1" max="10" value="2">
                </div>

                <button class="btn-game btn-shuffle" onclick="startShuffle()"><i class="fa-solid fa-shuffle"></i> LỐC XOÁY</button>
                <button class="btn-game btn-reveal" onclick="revealAnswer()"><i class="fa-solid fa-check-double"></i> XẾP LẠI</button>
            </div>
        </div>

        <div class="arena" id="arena">
            <div class="sentence-counter" id="counter">Câu 0 / 0</div>
        </div>
    </div>

    <script src="/mhent-ui.js"></script>
    <script>
        let sentenceList = [];
        let currentIndex = 0;
        let blocks = [];
        let animationId;
        let isMoving = false;

        // 🔥 DANH SÁCH 6 LỚP MÀU TƯƠNG ỨNG VỚI 6 TRỤ CỘT
        const colorClasses = ['block-turquoise', 'block-pink', 'block-yellow', 'block-purple', 'block-silver', 'block-lightblue'];

        window.addEventListener('storage', e => {
            if(e.key !== 'mhent_unscram_cmd') return;
            const data = JSON.parse(e.newValue);
            if(data.action === 'SYNC') { 
                initGame(data.payload.sentences);
                showToast("Nhận lệnh!", "Dữ liệu mới đã được nạp từ Admin!", "success");
            }
        });

        function initGame(sentences) {
            document.getElementById('waiting-msg').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            
            sentenceList = sentences || [];
            currentIndex = 0;
            if(sentenceList.length > 0) loadSentence(currentIndex);
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('id');
            const waitingMsg = document.getElementById('waiting-msg');
            
            if (gameId) {
                if(waitingMsg) waitingMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><br><br>Đang tải giáo án từ Két sắt Đám Mây...';
                
                try {
                    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2D9oAH4Q21Xf9NZls3J2Ojh7jCZB_H6iIg9dISJaBF79GXiJNr7AwFi819Rt_kctaeQ/exec";
                    let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getGameById', gameType: 'unscram', rowId: gameId }) });
                    let result = await res.json();
                    
                    if (result.success) {
                        initGame(result.gameData.sentences);
                        showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                    } else {
                        if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;"></i><br><br>Lỗi: Không tìm thấy mã giáo án này!`;
                    }
                } catch(e) {
                    if(waitingMsg) waitingMsg.innerHTML = `<i class="fa-solid fa-wifi" style="color:#ef4444;"></i><br><br>Lỗi mạng rùi cậu ơi!`;
                }
            }
        });

        function loadSentence(index) {
            cancelAnimationFrame(animationId);
            isMoving = false;
            const arena = document.getElementById('arena');
            
            Array.from(arena.children).forEach(child => {
                if(!child.classList.contains('sentence-counter')) child.remove();
            });
            blocks = [];

            if(!sentenceList || sentenceList.length === 0) return;
            document.getElementById('counter').innerText = `Câu ${index + 1} / ${sentenceList.length}`;
            
            let words = sentenceList[index].split(' ').filter(w => w.trim() !== '');

            words.forEach((word, i) => {
                const el = document.createElement('div');
                
                // 🌀 TÔ MÀU NGẪU NHIÊN CHO TỪNG TỪ BẰNG CÁCH CHỌN 1 TRONG 6 MÀU
                const randomColorClass = colorClasses[Math.floor(Math.random() * colorClasses.length)];
                el.className = `word-block ${randomColorClass}`; // Gán lớp màu
                
                el.innerText = word;
                arena.appendChild(el);

                const rect = el.getBoundingClientRect();
                const arenaRect = arena.getBoundingClientRect();
                let x = Math.random() * (arenaRect.width - rect.width - 40) + 20;
                let y = Math.random() * (arenaRect.height - rect.height - 40) + 20;
                
                let vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1);
                let vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1);

                blocks.push({ el, x, y, vx, vy, width: rect.width, height: rect.height, order: i });
                
                el.style.transform = `translate(${arenaRect.width/2 - rect.width/2}px, ${arenaRect.height/2 - rect.height/2}px)`;
            });
        }

        function startShuffle() {
            if(blocks.length === 0 || isMoving) return;
            isMoving = true;
            blocks.forEach(b => b.el.style.transition = 'none');
            animate();
        }

        function animate() {
            const arena = document.getElementById('arena');
            const arenaRect = arena.getBoundingClientRect();
            let speedMulti = parseFloat(document.getElementById('speed-slider').value);

            blocks.forEach(b => {
                b.x += b.vx * speedMulti;
                b.y += b.vy * speedMulti;

                if(b.x <= 0 || b.x + b.width >= arenaRect.width) b.vx *= -1;
                if(b.y <= 0 || b.y + b.height >= arenaRect.height) b.vy *= -1;

                b.x = Math.max(0, Math.min(b.x, arenaRect.width - b.width));
                b.y = Math.max(0, Math.min(b.y, arenaRect.height - b.height));

                b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
            });

            if(isMoving) { animationId = requestAnimationFrame(animate); }
        }

        function revealAnswer() {
            if(blocks.length === 0) return;
            isMoving = false;
            cancelAnimationFrame(animationId);

            const arenaRect = document.getElementById('arena').getBoundingClientRect();
            const gapX = 20; // Khoảng cách ngang giữa các chữ
            const gapY = 30; // Khoảng cách dọc giữa các dòng
            const maxWidth = arenaRect.width - 100; // Cách 2 lề 50px cho an toàn không bị lẹm

            // Xếp các block về đúng số báo danh ban đầu
            blocks.sort((a,b) => a.order - b.order);

            // 🔥 THUẬT TOÁN CHIA DÒNG (WORD WRAP)
            let lines = [];
            let currentLine = [];
            let currentLineWidth = 0;

            blocks.forEach(b => {
                // Nếu độ dài dòng hiện tại + chữ mới vượt quá màn hình -> Cắt sang dòng mới
                if (currentLineWidth + b.width > maxWidth && currentLine.length > 0) {
                    lines.push({ items: currentLine, width: currentLineWidth - gapX });
                    currentLine = [b];
                    currentLineWidth = b.width + gapX;
                } else {
                    currentLine.push(b);
                    currentLineWidth += b.width + gapX;
                }
            });
            // Đẩy dòng cuối cùng vào mảng
            if (currentLine.length > 0) {
                lines.push({ items: currentLine, width: currentLineWidth - gapX });
            }

            // 🔥 TÍNH TOÁN CHIỀU CAO TỔNG ĐỂ CĂN GIỮA THEO TRỤC Y
            const blockHeight = blocks[0].height;
            const totalHeight = (lines.length * blockHeight) + ((lines.length - 1) * gapY);
            let startY = (arenaRect.height - totalHeight) / 2;

            // 🔥 CHO CHỮ BAY VỀ VỊ TRÍ THEO TỪNG DÒNG
            lines.forEach(line => {
                let currentX = (arenaRect.width - line.width) / 2; // Căn giữa trục X cho dòng này
                
                line.items.forEach(b => {
                    b.el.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)'; 
                    b.x = currentX;
                    b.y = startY;
                    b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
                    currentX += b.width + gapX;
                });
                
                // Xếp xong 1 dòng thì tụt tọa độ Y xuống để xếp dòng tiếp theo
                startY += blockHeight + gapY;
            });
        }

        function nextSentence() { if(currentIndex < sentenceList.length - 1) { currentIndex++; loadSentence(currentIndex); } }
        function prevSentence() { if(currentIndex > 0) { currentIndex--; loadSentence(currentIndex); } }

    </script>
    <script type="module" src="/maintenance.js"></script>
</body>
</html>
