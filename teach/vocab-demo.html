<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Vocabulary - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css"> 
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* MÀN HÌNH CHỜ (START SCREEN) */
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .lesson-title { font-size: 40px; font-weight: 900; color: var(--hub-color); margin-bottom: 10px; }
        .lesson-desc { font-size: 18px; color: #94a3b8; margin-bottom: 40px; max-width: 600px; line-height: 1.6; }
        .btn-start { padding: 15px 30px; font-size: 18px; font-weight: 900; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; margin: 10px; font-family: inherit; display: inline-flex; align-items: center; gap: 10px; }
        .btn-start.normal { background: #10b981; color: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .btn-start.challenge { background: #f59e0b; color: white; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-start:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* MÀN HÌNH CHƠI (GAME SCREEN) */
        #game-screen { display: none; height: 100vh; flex-direction: column; }
        .present-header { text-align: center; padding: 20px 20px 0 20px; }
        #present-meaning { font-size: 32px; font-weight: 900; color: white; min-height: 45px; background: var(--hub-bg); display: inline-block; padding: 15px 40px; border-radius: 15px; border: 2px solid var(--hub-color); margin-bottom: 10px; }
        #present-status { font-size: 22px; font-weight: 800; color: #ff85a2; min-height: 30px; margin-top: 10px; text-transform: uppercase; }
        
        .present-board { flex: 1; padding: 10px 50px 30px 50px; display: flex; flex-direction: column; justify-content: center; }
        .word-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1100px; margin: 0 auto; width: 100%; }
        
        .word-card { background: #1e293b; border: 3px solid #334155; padding: 25px 15px; border-radius: 12px; font-size: 26px; font-weight: 900; color: white; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; text-align: center; user-select: none; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .word-card:hover { border-color: var(--hub-color); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(14,165,233,0.3); }
        
        /* TRẠNG THÁI CARD TRONG VÁN CHƠI */
        .word-card.correct { background: #10b981 !important; border-color: #059669 !important; transform: scale(1.05); }
        .word-card.incorrect { background: #ef4444 !important; border-color: #b91c1c !important; opacity: 0.8; pointer-events: none; }
        .word-card.disabled { pointer-events: none; }
        /* 💡 KHÔNG CÒN CLASS .solved-past Ở ĐÂY NỮA, 100% LÀ ĐẠN MÙ */

        /* CHẾ ĐỘ SƯƠNG MÙ */
        .word-card.covered { background: #0f172a; border-color: #1e293b; color: transparent; background-image: repeating-linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b), repeating-linear-gradient(45deg, #1e293b 25%, #0f172a 25%, #0f172a 75%, #1e293b 75%, #1e293b); background-position: 0 0, 15px 15px; background-size: 30px 30px; box-shadow: none; pointer-events: auto !important;}
        .word-card.revealed-temp { background: #f59e0b; color: white; border-color: #d97706; pointer-events: auto; transform: scale(1.05); box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }

        /* NÚT CHUYỂN CÂU */
        .controls { text-align: center; padding-bottom: 30px; }
        #btn-next { display: none; background: var(--hub-color); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; font-family: inherit; }
        #btn-next:hover { background: #0284c7; transform: scale(1.05); box-shadow: 0 10px 20px rgba(14,165,233,0.3); }
    </style>
</head>
<body>

    <div id="start-screen">
        <div style="font-size: 16px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px;">CLAP THE BOARD (DEMO)</div>
        <h1 class="lesson-title">Chủ đề: TỪ VỰNG PHỔ THÔNG</h1>
        <p class="lesson-desc">Đây là bản Demo (Solo Mode) giúp bạn trải nghiệm công cụ Vocab Arena. Hãy tìm từ vựng tiếng Anh tương ứng với mô tả tiếng Việt nhé!</p>
        
        <div>
            <button class="btn-start normal" onclick="startGame('normal')"><i class="fa-solid fa-play"></i> Chơi Chế Độ Thường</button>
            <button class="btn-start challenge" onclick="startGame('challenge')"><i class="fa-solid fa-fire"></i> Chế Độ Sương Mù</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="present-header">
            <div style="font-size: 14px; font-weight: 800; color: #94a3b8; margin-bottom: 5px;">HÃY TÌM TỪ CÓ NGHĨA LÀ:</div>
            <div id="present-meaning">Đang tải dữ liệu...</div>
            <div id="present-status">SẴN SÀNG!</div>
        </div>
        
        <div class="present-board">
            <div class="word-grid" id="present-grid"></div>
        </div>

        <div class="controls">
            <button id="btn-next" onclick="nextQuestion()">CÂU TIẾP THEO <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        // ==========================================
        // 📚 NƠI GIÁO VIÊN NHẬP GIÁO ÁN
        // ==========================================
        const LESSON_DATA = [
            { id: 'w_1', word: 'jam', meaning: 'Mứt trái cây' },
            { id: 'w_2', word: 'an actor', meaning: 'Diễn viên' },
            { id: 'w_3', word: 'a firefighter', meaning: 'Lính cứu hỏa' },
            { id: 'w_4', word: 'a flashlight', meaning: 'Đèn pin' },
            { id: 'w_5', word: 'an astronaut', meaning: 'Phi hành gia' },
            { id: 'w_6', word: 'flour', meaning: 'Bột mì' },
            { id: 'w_7', word: 'cheese', meaning: 'Phô mai' },
            { id: 'w_8', word: 'salt', meaning: 'Muối' },
            { id: 'w_9', word: 'a cook', meaning: 'Đầu bếp' },
            { id: 'w_10', word: 'a mechanic', meaning: 'Thợ cơ khí, thợ máy' },
            { id: 'w_11', word: 'a ring', meaning: 'Nhẫn' },
            { id: 'w_12', word: 'a pizza', meaning: 'Bánh Pizza' },
            { id: 'w_13', word: 'a spoon', meaning: 'Muỗng, Thìa' },
            { id: 'w_14', word: 'a comb', meaning: 'Cái lược' },
            { id: 'w_15', word: 'an artist', meaning: 'Nghệ sĩ' },
        ];

        // ==========================================
        // LOGIC VẬN HÀNH BẢN SOLO
        // ==========================================
        let gameMode = 'normal';
        const strikesAllowed = 0; // Số mạng được phép sai
        
        let questionQueue = [];
        let currentTarget = null;
        let strikesCurrent = 0;
        let isQuestionActive = false;
        let challengeTimer = null;
        let gridOrder = [];

        // Thuật toán xáo trộn Fisher-Yates (Tuyệt đối ngẫu nhiên, xáo trộn mạnh nhất)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            // Xáo trộn 1: Trộn thứ tự câu hỏi
            questionQueue = shuffleArray([...LESSON_DATA]);
            
            // Xáo trộn 2: Trộn thứ tự thẻ bài trên bảng
            gridOrder = shuffleArray([...LESSON_DATA]);
            
            loadNextQuestion();
        }

        function loadNextQuestion() {
            if (questionQueue.length === 0) {
                endGame();
                return;
            }

            currentTarget = questionQueue.shift();
            strikesCurrent = 0;
            isQuestionActive = true;
            document.getElementById('btn-next').style.display = 'none';

            // Hiển thị Nghĩa từ vựng
            document.getElementById('present-meaning').innerText = currentTarget.meaning;
            document.getElementById('present-status').innerText = "HÃY TÌM TỪ CHÍNH XÁC!";
            document.getElementById('present-status').style.color = "var(--hub-color)";

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('present-grid');
            grid.innerHTML = '';
            
            gridOrder.forEach(item => {
                const card = document.createElement('div'); 
                card.className = 'word-card'; 
                card.innerText = item.word; 
                card.dataset.id = item.id;
                
                // 💡 Không có bất kỳ lệnh gán class "solved-past" hay "mờ đi" nào ở đây. Toàn bộ 16 thẻ đều sáng!
                card.onclick = () => handleClick(card, item.id);
                grid.appendChild(card);
            });
            
            applyFog();
        }

        function handleClick(card, selectedId) {
            if(!isQuestionActive || card.classList.contains('disabled')) return;
            card.classList.remove('covered');

            if(selectedId === currentTarget.id) { // ĐÚNG
                clearInterval(challengeTimer);
                if(gameMode === 'challenge') document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp'));
                
                card.classList.add('correct'); 
                isQuestionActive = false;
                
                document.getElementById('present-status').innerText = "🎉 XUẤT SẮC! CÂU TRẢ LỜI CHÍNH XÁC!"; 
                document.getElementById('present-status').style.color = "#10b981";
                document.querySelectorAll('.word-card').forEach(c => c.classList.add('disabled'));
                
                document.getElementById('btn-next').style.display = 'inline-block';
            } else { // SAI (Bấm nhầm Đạn mù cũng tính là Sai nha!)
                card.classList.add('incorrect', 'disabled'); 
                strikesCurrent++;

                if(strikesCurrent > strikesAllowed) { // HẾT MẠNG
                    clearInterval(challengeTimer);
                    if(gameMode === 'challenge') document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp'));
                    
                    document.querySelector(`.word-card[data-id="${currentTarget.id}"]`).classList.add('correct');
                    isQuestionActive = false;
                    
                    document.getElementById('present-status').innerText = "RẤT TIẾC! LƯỢT CHỌN ĐÃ KẾT THÚC!"; 
                    document.getElementById('present-status').style.color = "#ef4444";
                    document.querySelectorAll('.word-card').forEach(c => c.classList.add('disabled'));
                    
                    document.getElementById('btn-next').style.display = 'inline-block';
                } else {
                    document.getElementById('present-status').innerText = `SAI RỒI! CÒN ${strikesAllowed - strikesCurrent + 1} LƯỢT CHỌN!`;
                    document.getElementById('present-status').style.color = "#f59e0b";
                }
            }
        }

        // 💡 ĐÂY LÀ ĐIỂM CHỐT: HÀM SHUFFLE MỖI KHI BẤM CÂU TIẾP THEO
        function nextQuestion() {
            // Dùng thuật toán Fisher-Yates xáo tung đội hình
            gridOrder = shuffleArray([...gridOrder]);
            loadNextQuestion();
        }

        function endGame() {
            document.getElementById('present-meaning').innerText = "CHÚC MỪNG BẠN ĐÃ HOÀN THÀNH BÀI HỌC!";
            document.getElementById('present-status').innerText = "Đây là bản Demo được thực hiện bởi MHEnt. Edu.!";
            document.getElementById('present-status').style.color = "#10b981";
            document.getElementById('present-grid').innerHTML = '';
            document.getElementById('btn-next').style.display = 'none';
        }

        function applyFog() {
            clearInterval(challengeTimer);
            if(gameMode !== 'challenge' || !isQuestionActive) { document.querySelectorAll('.word-card').forEach(c => c.classList.remove('covered', 'revealed-temp')); return; }

            // PHỦ SƯƠNG MÙ LÊN TẤT CẢ TỪ (BAO GỒM CẢ ĐẠN MÙ)
            const cards = Array.from(document.querySelectorAll('.word-card'));
            cards.forEach(c => c.classList.add('covered'));

            challengeTimer = setInterval(() => {
                if(!isQuestionActive) { clearInterval(challengeTimer); return; }
                cards.forEach(c => c.classList.remove('revealed-temp'));
                const available = cards.filter(c => !c.classList.contains('incorrect'));
                if(available.length > 0) {
                    let num = Math.max(1, Math.round(available.length / 5));
                    // Shuffle nhẹ mảng có sẵn để chớp tắt
                    available.sort(() => 0.5 - Math.random()).slice(0, num).forEach(c => c.classList.add('revealed-temp'));
                }
            }, 1500);
        }
    </script>
    <script src="/check-token.js"></script>
</body>
</html>
