<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bom Hẹn Giờ - MHEnt. Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --team1-color: #f43f5e;
            --team2-color: #3b82f6;
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-dark); color: white;
            font-family: 'Nunito', sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
            transition: background-color 0.3s;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--panel-bg);
            border-bottom: 2px solid #334155; z-index: 10;
        }
        .header h1 { margin: 0; color: #f59e0b; font-size: 24px; text-shadow: 0 0 10px rgba(245,158,11,0.3); }

        .arena {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        /* KHU VỰC HIỂN THỊ TEAM ĐANG GIỮ BOM */
        .status-badge {
            font-size: 28px; font-weight: 900; padding: 15px 40px;
            border-radius: 50px; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 30px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #334155; color: #94a3b8; border: 4px solid #475569;
        }
        .status-badge.team1 { background: rgba(244, 63, 94, 0.2); color: var(--team1-color); border-color: var(--team1-color); box-shadow: 0 0 30px rgba(244, 63, 94, 0.4); }
        .status-badge.team2 { background: rgba(59, 130, 246, 0.2); color: var(--team2-color); border-color: var(--team2-color); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }

        /* QUẢ BOM */
        .bomb-container {
            position: relative; text-align: center;
        }
        .bomb-icon {
            font-size: 180px; color: #334155;
            transition: color 0.3s, transform 0.1s;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }
        .bomb-icon.active { color: #1e293b; }
        
        /* Đồng hồ LED đính trên thân bom */
        .timer-display {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            font-family: monospace; font-size: 45px; font-weight: 900;
            color: #ef4444; background: #000; padding: 5px 15px;
            border-radius: 10px; border: 3px solid #333;
            text-shadow: 0 0 10px #ef4444; letter-spacing: 3px;
        }

        /* BẢNG ĐIỀU KHIỂN CÀI ĐẶT */
        .setup-panel {
            position: absolute; display: flex; flex-direction: column; gap: 15px;
            background: var(--panel-bg); padding: 30px; border-radius: 20px;
            border: 2px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 20; text-align: center;
        }
        .setup-panel h2 { margin: 0 0 10px 0; color: #f8fafc; }
        .setup-panel input {
            font-size: 30px; text-align: center; padding: 10px; width: 100px;
            border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: white;
            font-family: 'Nunito', sans-serif; font-weight: 900; margin: 0 auto; outline: none;
        }
        .setup-panel input:focus { border-color: #f59e0b; }

        /* NÚT BẤM */
        .btn {
            padding: 15px 30px; font-size: 20px; font-weight: 900; border: none; border-radius: 12px;
            cursor: pointer; transition: 0.2s; color: white; font-family: 'Nunito';
            text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); }
        .btn-start { background: #10b981; box-shadow: 0 6px 0 #047857; margin-top: 10px; }
        .btn-pass { 
            background: #f59e0b; box-shadow: 0 8px 0 #b45309; 
            font-size: 30px; padding: 20px 60px; margin-top: 40px; display: none;
        }
        .btn-reset { background: #64748b; box-shadow: 0 6px 0 #475569; margin-top: 20px; display: none;}

        /* HIỆU ỨNG RUNG LẮC (PANIC MODE) */
        @keyframes panic-shake {
            0% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
            25% { transform: translate(5px, 5px) rotate(5deg) scale(1.1); }
            50% { transform: translate(0, -5px) rotate(0eg) scale(1.1); }
            75% { transform: translate(-5px, 5px) rotate(-5deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1.1); }
        }
        .panic {
            animation: panic-shake 0.2s infinite; color: #ef4444 !important;
            filter: drop-shadow(0 0 50px rgba(239, 68, 68, 0.8));
        }

        /* HIỆU ỨNG NỔ TUNG */
        @keyframes explode-screen {
            0% { background-color: #ffffff; }
            10% { background-color: #ef4444; }
            100% { background-color: var(--bg-dark); }
        }
        body.exploded { animation: explode-screen 1s ease-out; }
        
        .explosion-icon {
            font-size: 250px; color: #f59e0b; display: none;
            filter: drop-shadow(0 0 100px #ef4444);
            animation: pop-out 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop-out { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bomb"></i> Bom Hẹn Giờ - MHEnt. Edu</h1>
        <div style="color: #94a3b8; font-weight: bold;"><i class="fa-solid fa-keyboard"></i> Phím tắt: SPACE để chuyền bom</div>
    </div>

    <div class="arena">
        
        <div class="setup-panel" id="setup-panel">
            <h2>Cài đặt thời gian (Giây)</h2>
            <input type="number" id="time-input" value="30" min="5" max="300">
            <button class="btn btn-start" onclick="startGame()"><i class="fa-solid fa-play"></i> BẮT ĐẦU</button>
        </div>

        <div class="status-badge" id="status-badge">Bom chưa kích hoạt</div>

        <div class="bomb-container" id="bomb-container">
            <i class="fa-solid fa-bomb bomb-icon" id="bomb-icon"></i>
            <div class="timer-display" id="timer-display">00.00</div>
            <i class="fa-solid fa-burst explosion-icon" id="explosion-icon"></i>
        </div>

        <button class="btn btn-pass" id="btn-pass" onclick="passBomb()">CHUYỂN BOM <i class="fa-solid fa-angles-right"></i></button>
        <button class="btn btn-reset" id="btn-reset" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i> CHƠI LẠI</button>
    </div>

    <script>
        let timeLeft = 0;
        let timerInterval = null;
        let currentTeam = 1; // 1 hoặc 2
        let isPlaying = false;

        const timeInput = document.getElementById('time-input');
        const timerDisplay = document.getElementById('timer-display');
        const bombIcon = document.getElementById('bomb-icon');
        const explosionIcon = document.getElementById('explosion-icon');
        const statusBadge = document.getElementById('status-badge');
        const setupPanel = document.getElementById('setup-panel');
        const btnPass = document.getElementById('btn-pass');
        const btnReset = document.getElementById('btn-reset');

        // ==========================================
        // HỆ THỐNG ÂM THANH (KHÔNG CẦN FILE NGOÀI)
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Tiếng Tích Tắc
        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        // Tiếng Chuyền Bom
        function playPass() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // Tiếng Nổ
        function playExplosion() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        // ==========================================
        // LOGIC TRÒ CHƠI
        // ==========================================
        function formatTime(seconds) {
            // Hiển thị kiểu 00.00 (có cả mili giây mờ mờ cho nguy hiểm)
            const s = Math.floor(seconds);
            return (s < 10 ? "0" : "") + s + ".00"; 
        }

        function startGame() {
            initAudio();
            let rawTime = parseInt(timeInput.value);
            if(isNaN(rawTime) || rawTime < 5) rawTime = 30;
            
            timeLeft = rawTime;
            currentTeam = 1;
            isPlaying = true;

            // Giao diện
            setupPanel.style.display = 'none';
            btnPass.style.display = 'block';
            bombIcon.classList.add('active');
            timerDisplay.innerText = formatTime(timeLeft);
            
            updateTeamUI();

            // Đếm ngược
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = formatTime(timeLeft);
                playTick();

                // Panic Mode (Dưới 10 giây)
                if (timeLeft <= 10 && timeLeft > 0) {
                    bombIcon.classList.add('panic');
                    timerDisplay.style.color = '#fff';
                }

                // HẾT GIỜ! NỔ BOM!
                if (timeLeft <= 0) {
                    explodeBomb();
                }
            }, 1000);
        }

        function passBomb() {
            if(!isPlaying) return;
            playPass();
            // Đổi Team
            currentTeam = currentTeam === 1 ? 2 : 1;
            updateTeamUI();
            
            // Xóa hiệu ứng panic chốc lát khi vừa nhận bom để tạo cảm giác "chuyền thành công"
            bombIcon.style.transform = 'scale(1.2)';
            setTimeout(() => { bombIcon.style.transform = ''; }, 150);
        }

        function updateTeamUI() {
            statusBadge.className = `status-badge team${currentTeam}`;
            statusBadge.innerText = `Đang giữ bom: TEAM ${currentTeam}`;
            
            // Đổi màu nút chuyền theo màu team cho rực rỡ
            btnPass.style.background = currentTeam === 1 ? 'var(--team1-color)' : 'var(--team2-color)';
            btnPass.style.boxShadow = `0 8px 0 ${currentTeam === 1 ? '#be123c' : '#1d4ed8'}`;
        }

        function explodeBomb() {
            clearInterval(timerInterval);
            isPlaying = false;
            playExplosion();

            // Đổi giao diện
            btnPass.style.display = 'none';
            btnReset.style.display = 'block';
            bombIcon.style.display = 'none';
            timerDisplay.style.display = 'none';
            explosionIcon.style.display = 'block';
            
            // Hiệu ứng màn hình
            document.body.classList.add('exploded');
            
            // Phán xét kết quả
            statusBadge.className = 'status-badge';
            statusBadge.style.background = '#ef4444';
            statusBadge.style.color = 'white';
            statusBadge.innerText = `💥 TEAM ${currentTeam} ĐÃ BỊ NỔ TUNG! 💥`;
        }

        function resetGame() {
            // Khôi phục giao diện mặc định
            document.body.classList.remove('exploded');
            setupPanel.style.display = 'flex';
            btnReset.style.display = 'none';
            bombIcon.style.display = 'inline-block';
            timerDisplay.style.display = 'block';
            explosionIcon.style.display = 'none';
            
            bombIcon.classList.remove('active', 'panic');
            timerDisplay.innerText = "00.00";
            timerDisplay.style.color = '#ef4444';
            statusBadge.className = 'status-badge';
            statusBadge.style.background = '#334155';
            statusBadge.style.color = '#94a3b8';
            statusBadge.innerText = "Bom chưa kích hoạt";
            
            clearInterval(timerInterval);
        }

        // Lắng nghe phím SPACE để bấm chuyền bom cho nhanh
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' && isPlaying) {
                event.preventDefault(); // Tránh bị cuộn trang
                passBomb();
            }
        });
    </script>
</body>
</html>
