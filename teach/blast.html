<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast Block: Realistic Minecraft - MHEnt. Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tex-grass: url('assets/grass.jfif');
            --tex-stone: url('assets/stone.png');
            --tex-dirt: url('assets/wood.jpg');
            --tex-tnt: url('assets/tnt.jfif');
            --bg-world: url('assets/wp2586787.jpg');
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-world) no-repeat center center;
            background-size: cover;
            color: white; font-family: 'Nunito', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            transition: background-color 0.1s;
        }

        .overlay-dim { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 0; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; background: rgba(0,0,0,0.6); 
            border-bottom: 4px solid #000; z-index: 10; 
            backdrop-filter: blur(5px);
        }
        .header h1 { margin: 0; color: #55ff55; font-family: monospace; text-transform: uppercase; letter-spacing: 2px; text-shadow: 3px 3px 0 #000; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 60px; position: relative; z-index: 5; }

        /* =========================================
           KHỐI BLOCK
           ========================================= */
        .question-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 90vw; }
        
        .mc-block {
            background-size: cover;
            border: 4px solid rgba(0,0,0,0.5);
            min-width: 120px; height: 120px; 
            font-size: 28px; font-weight: 900;
            box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4), 5px 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase; position: relative;
            display: flex; align-items: center; justify-content: center; 
            text-shadow: 2px 2px 0 #000; transition: 0.2s; 
            user-select: none;
        }

        .mc-blank {
            background: rgba(0,0,0,0.6); border: 4px dashed rgba(255,255,255,0.3);
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.8);
            min-width: 120px; height: 120px;
        }

        .mc-memory { width: 250px; height: 250px; font-size: 36px; transition: 0.6s; transform-style: preserve-3d; }
        .mc-memory.flipped { transform: rotateY(180deg); }
        .mc-memory span { transition: 0.3s; backface-visibility: hidden; }
        .mc-memory.flipped span { transform: rotateY(180deg); color: #fff; }

        .options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 20px; }
        .mc-ans { cursor: pointer; }
        .mc-ans:hover { transform: translateY(-8px) scale(1.05); filter: brightness(1.2); }

        /* =========================================
           TNT & KHÓI
           ========================================= */
        .mc-tnt {
            position: absolute; width: 120px; height: 120px;
            background: var(--tex-tnt); background-size: cover;
            border: 2px solid #fff; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none; opacity: 0;
        }
        
        .tnt-drop { animation: dropTNT 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 1; }
        @keyframes dropTNT { 0% { transform: translateY(-500px) scale(0.5); } 100% { transform: translateY(0) scale(1); } }

        .tnt-fuse { animation: fuseFlash 0.15s infinite alternate; }
        @keyframes fuseFlash { 0% { filter: brightness(1); } 100% { filter: brightness(4) contrast(0); transform: scale(1.05); } }

        .explosion-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 999; pointer-events: none;
            animation: kaboom 0.6s ease-out forwards;
        }
        @keyframes kaboom { 0% { opacity: 1; background: #fff; } 50% { background: #ffaa00; } 100% { opacity: 0; background: transparent; } }

        .shake-screen { animation: shake 0.3s linear both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }

        .smoke { position: fixed; background: rgba(255,255,255,0.8); border-radius: 50%; z-index: 50; pointer-events: none; }
        .particle { position: fixed; width: 20px; height: 20px; z-index: 50; pointer-events: none; }

        .xp-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 12px; background: rgba(0,0,0,0.7); }
        #xp-progress { width: 0%; height: 100%; background: #55ff55; box-shadow: 0 0 25px #55ff55; transition: 0.5s; }
    </style>
</head>
<body>
    <audio id="snd-orb" src="assets/orb.mp3" preload="auto"></audio>
    <audio id="snd-tnt" src="assets/tnt-explosion.mp3" preload="auto"></audio>

    <div class="overlay-dim"></div>

    <div class="header">
        <h1><i class="fa-solid fa-cube"></i> BLAST BLOCK: REALISTIC</h1>
        <div id="level-txt" style="font-weight: 900; color: #ffff55; font-size: 20px; text-shadow: 2px 2px 0 #000;">LVL: 1/1</div>
    </div>

    <div class="game-container">
        <div class="question-row" id="question-row"></div>
        <div class="options-area" id="options-area"></div>
    </div>

    <div class="xp-bar"><div id="xp-progress"></div></div>

    <script>
        let questions = [], currentIndex = 0, isProcessing = false;
        const qRow = document.getElementById('question-row');
        const optArea = document.getElementById('options-area');
        const xpProgress = document.getElementById('xp-progress');

        const textures = ['var(--tex-grass)', 'var(--tex-stone)', 'var(--tex-dirt)'];

        // HÀM PHÁT NHẠC (Dùng cloneNode để phát đè lên nhau không bị giật lag)
        function playSoundInstant(id) {
            let original = document.getElementById(id);
            if (original) {
                let clone = original.cloneNode();
                clone.volume = 1.0;
                clone.play().catch(e => console.log("Trình duyệt chặn autoplay", e));
            }
        }

        function spawnParticles(element, isSmoke = false) {
            const rect = element.getBoundingClientRect();
            const tex = element.style.backgroundImage; // Lấy màu gạch hiện tại
            
            for(let i=0; i< (isSmoke ? 25 : 15); i++) {
                let p = document.createElement('div');
                p.className = isSmoke ? 'smoke' : 'particle';
                p.style.left = rect.left + (Math.random() * rect.width) + 'px';
                p.style.top = rect.top + (Math.random() * rect.height) + 'px';
                
                if (isSmoke) {
                    const size = Math.random() * 40 + 20;
                    p.style.width = size + 'px'; p.style.height = size + 'px';
                    p.style.background = `rgba(200,200,200,${Math.random() * 0.5 + 0.3})`;
                } else {
                    p.style.backgroundImage = tex;
                    p.style.backgroundSize = '500%';
                }
                document.body.appendChild(p);
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 60 + Math.random() * 120;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity + (isSmoke ? -100 : 150);
                
                p.animate([
                    { transform: `translate(0,0) scale(1)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(${isSmoke ? 2 : 0})`, opacity: 0 }
                ], { duration: isSmoke ? 1000 : 700, easing: 'ease-out' });
                setTimeout(() => p.remove(), 1000);
            }
            if(!isSmoke) element.style.opacity = 0;
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_blast_cmd') {
                const data = JSON.parse(e.newValue);
                questions = data.payload.questions; 
                currentIndex = 0; loadQuestion();
            }
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                qRow.innerHTML = `<div class="mc-block" style="width: auto; padding: 0 40px; background-image:var(--tex-grass)"><span style="color:#55ff55;">MISSION COMPLETE!</span></div>`;
                optArea.innerHTML = ""; return;
            }
            
            isProcessing = false; 
            const cur = questions[currentIndex];
            document.getElementById('level-txt').innerText = `LVL: ${currentIndex + 1}/${questions.length}`;
            document.body.classList.remove('shake-screen');
            qRow.innerHTML = "";
            
            // 🔥 CỐ ĐỊNH 1 LOẠI TEXTURE CHO TOÀN BỘ CÂU HỎI NÀY
            const levelTexture = textures[currentIndex % textures.length];

            if (cur.type === 'memory') {
                const block = document.createElement('div');
                block.className = 'mc-block mc-memory';
                block.style.backgroundImage = levelTexture;
                block.innerHTML = `<span>${cur.q}</span>`;
                qRow.appendChild(block);
            } else {
                const safeQ = cur.q.replace(/___/g, ' ___ ').trim();
                const words = safeQ.split(/\s+/); 
                let hasBlank = false;

                words.forEach(w => {
                    const block = document.createElement('div');
                    if (w === '___') {
                        block.className = 'mc-blank';
                        block.id = 'blank-spot';
                        hasBlank = true;
                    } else {
                        block.className = 'mc-block';
                        block.style.backgroundImage = levelTexture;
                        block.innerHTML = `<span>${w}</span>`;
                    }
                    qRow.appendChild(block);
                });

                if (!hasBlank) {
                    const blankBlock = document.createElement('div');
                    blankBlock.className = 'mc-blank';
                    blankBlock.id = 'blank-spot';
                    qRow.appendChild(blankBlock);
                }
            }

            optArea.innerHTML = "";
            let opts = (cur.type === 'memory') ? [cur.a] : cur.options;
            if (cur.type !== 'memory') opts = [...opts].sort(() => Math.random() - 0.5);

            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'mc-block mc-ans'; 
                // Đáp án cũng dùng chung 1 loại gạch với câu hỏi cho đồng bộ
                btn.style.backgroundImage = levelTexture;
                btn.innerHTML = `<span>${o}</span>`;
                btn.onclick = () => checkAnswer(o, btn, levelTexture);
                optArea.appendChild(btn);
            });
            xpProgress.style.width = (currentIndex / questions.length) * 100 + "%";
        }

        function checkAnswer(choice, element, levelTexture) {
            if(isProcessing) return; isProcessing = true; 
            
            const cur = questions[currentIndex];
            const isCorrect = (choice === cur.a);
            const blankSpot = document.getElementById('blank-spot');

            if (isCorrect) {
                if (cur.type !== 'memory' && blankSpot) {
                    blankSpot.className = 'mc-block';
                    blankSpot.style.backgroundImage = levelTexture;
                    blankSpot.innerHTML = `<span>${choice}</span>`;
                    element.style.opacity = '0';
                }

                setTimeout(() => {
                    if(cur.type === 'memory') {
                        const memBlock = qRow.firstChild;
                        memBlock.classList.add('flipped');
                        memBlock.querySelector('span').innerText = cur.a;
                    }
                    setTimeout(() => {
                        // PHÁT NHẠC VÀ ĐẬP GẠCH CÙNG LÚC
                        playSoundInstant('snd-orb');
                        Array.from(qRow.children).forEach(c => spawnParticles(c));
                        if(cur.type !== 'memory') spawnParticles(element);
                        
                        setTimeout(() => { currentIndex++; loadQuestion(); }, 800);
                    }, cur.type === 'memory' ? 1000 : 600);
                }, 100);
            } 
            else {
                let targetRect = (blankSpot || qRow.firstChild).getBoundingClientRect();
                const tnt = document.createElement('div');
                tnt.className = 'mc-tnt tnt-drop';
                tnt.style.left = targetRect.left + 'px';
                tnt.style.top = targetRect.top + 'px';
                document.body.appendChild(tnt);

                setTimeout(() => {
                    tnt.classList.remove('tnt-drop');
                    tnt.classList.add('tnt-fuse');

                    setTimeout(() => {
                        // PHÁT NHẠC NỔ VÀ HIỆU ỨNG RUNG CÙNG LÚC
                        playSoundInstant('snd-tnt');
                        document.body.classList.add('shake-screen');
                        
                        const flash = document.createElement('div');
                        flash.className = 'explosion-flash';
                        document.body.appendChild(flash);
                        setTimeout(() => flash.remove(), 600);

                        spawnParticles(tnt, true);
                        tnt.remove();
                        qRow.innerHTML = ""; optArea.innerHTML = "";
                        
                        setTimeout(() => { loadQuestion(); }, 500); 
                    }, 1200); 
                }, 400);
            }
        }
    </script>
</body>
</html>
