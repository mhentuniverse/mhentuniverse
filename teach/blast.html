<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast Block: Realistic Minecraft - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css"> 
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Dùng đúng các hình ảnh cậu gửi */
            --tex-grass: url('assets/grass.jfif');
            --tex-stone: url('assets/stone.png');
            --tex-dirt: url('assets/wood.jpg');
            --tex-tnt: url('assets/tnt.jfif');
            --bg-world: url('assets/wp2586787.jpg');
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-world) no-repeat center center;
            background-size: cover; color: white; font-family: 'Nunito', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .overlay-dim { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 0; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; background: rgba(0,0,0,0.6); 
            border-bottom: 4px solid #000; z-index: 10; backdrop-filter: blur(5px);
        }
        .header h1 { margin: 0; color: #55ff55; font-family: monospace; text-transform: uppercase; letter-spacing: 2px; text-shadow: 3px 3px 0 #000; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 60px; position: relative; z-index: 5; }

        /* KHỐI BLOCK */
        .question-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; align-items: center; max-width: 90vw; }
        
        .mc-block {
            background-size: 100% 100%; border: 4px solid rgba(0,0,0,0.5);
            min-width: 110px; height: 110px; font-size: 26px; font-weight: 900;
            box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4), 5px 10px 20px rgba(0,0,0,0.4);
            text-transform: uppercase; position: relative;
            display: flex; align-items: center; justify-content: center; 
            text-shadow: 2px 2px 0 #000; transition: 0.15s; user-select: none;
        }

        .mc-blank {
            background: rgba(0,0,0,0.7); border: 4px dashed rgba(255,255,255,0.4);
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.9);
            min-width: 110px; height: 110px;
        }

        .options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 20px; }
        .mc-ans { cursor: pointer; }
        .mc-ans:hover { transform: translateY(-8px) scale(1.05); filter: brightness(1.2); }

        /* TNT */
        .mc-tnt {
            position: absolute; width: 110px; height: 110px;
            background: var(--tex-tnt); background-size: 100% 100%;
            border: 2px solid #fff; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: none; opacity: 0;
        }
        
        .tnt-drop { animation: dropTNT 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 1; }
        @keyframes dropTNT { 0% { transform: translateY(-500px) scale(0.5); } 100% { transform: translateY(0) scale(1); } }

        .tnt-fuse { animation: fuseFlash 0.1s infinite alternate; }
        @keyframes fuseFlash { 0% { filter: brightness(1); } 100% { filter: brightness(5) contrast(0); transform: scale(1.08); } }

        /* HIỆU ỨNG NỔ/RUNG */
        .explosion-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; pointer-events: none; animation: kaboom 0.6s ease-out forwards; }
        @keyframes kaboom { 0% { opacity: 1; background: #fff; } 40% { background: #ffaa00; } 100% { opacity: 0; background: transparent; } }

        .shake-screen { animation: shake 0.3s linear both; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } 75% { transform: translate(-8px, -8px); } }

        .smoke { position: fixed; background: rgba(255,255,255,0.9); border-radius: 50%; z-index: 50; pointer-events: none; }
        .particle { position: fixed; width: 15px; height: 15px; z-index: 50; pointer-events: none; }

        .xp-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 10px; background: rgba(0,0,0,0.8); }
        #xp-progress { width: 0%; height: 100%; background: #55ff55; box-shadow: 0 0 20px #55ff55; transition: 0.4s; }
    </style>
</head>
<body>
    <div class="overlay-dim"></div>

    <div class="header">
        <h1><i class="fa-solid fa-cube"></i> BLAST BLOCK: REALISTIC</h1>
        <div id="level-txt" style="font-weight: 900; color: #ffff55; font-size: 20px; text-shadow: 2px 2px 0 #000;">LVL: 1/1</div>
    </div>

    <div class="game-container">
        <div class="question-row" id="question-row"></div>
        <div class="options-area" id="options-area"></div>
    </div>

    <div class="xp-bar"><div id="xp-progress"></div></div>

    <script>
        // --- HỆ THỐNG ÂM THANH WEBAUDIO (GIẢI QUYẾT LAG) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffers = {};

        async function loadSound(name, url) {
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                buffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                console.log(`Loaded: ${name}`);
            } catch (e) { console.error("Lỗi tải âm thanh:", e); }
        }

        // Tải trước toàn bộ âm thanh vào RAM
        loadSound('orb', 'assets/orb.mp3'); // Sử dụng file âm thanh cục bộ
        loadSound('tnt', 'assets/tnt-explosion.mp3'); // Sử dụng file âm thanh cục bộ

        function playSound(name) {
            if (!buffers[name]) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource();
            source.buffer = buffers[name];
            source.connect(audioCtx.destination);
            source.start(0);
        }

        // --- CẤU HÌNH TRÒ CHƠI ---
        let questions = [], currentIndex = 0, isProcessing = false;
        const qRow = document.getElementById('question-row');
        const optArea = document.getElementById('options-area');
        const xpProgress = document.getElementById('xp-progress');

        const textures = ['var(--tex-grass)', 'var(--tex-stone)', 'var(--tex-dirt)'];

        function spawnParticles(element, isSmoke = false) {
            const rect = element.getBoundingClientRect();
            const tex = element.style.backgroundImage;
            const count = isSmoke ? 15 : 10; // Giảm bớt cho máy yếu

            for(let i=0; i<count; i++) {
                let p = document.createElement('div');
                p.className = isSmoke ? 'smoke' : 'particle';
                p.style.left = rect.left + (rect.width/2) + 'px';
                p.style.top = rect.top + (rect.height/2) + 'px';
                
                if (isSmoke) {
                    const size = Math.random() * 30 + 20;
                    p.style.width = size + 'px'; p.style.height = size + 'px';
                } else {
                    p.style.backgroundImage = tex;
                    p.style.backgroundSize = '400%';
                }
                document.body.appendChild(p);
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 50 + Math.random() * 80;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity + (isSmoke ? -80 : 100);
                
                p.animate([
                    { transform: `translate(0,0) scale(1)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(${isSmoke ? 2.5 : 0})`, opacity: 0 }
                ], { duration: isSmoke ? 800 : 500, easing: 'ease-out' });
                setTimeout(() => p.remove(), 800);
            }
            if(!isSmoke) element.style.opacity = 0;
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_blast_cmd') {
                const data = JSON.parse(e.newValue);
                questions = data.payload.questions; 
                currentIndex = 0; loadQuestion();
            }
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                qRow.innerHTML = `<div class="mc-block" style="width: auto; padding: 0 40px; background-image:var(--tex-grass)"><span style="color:#55ff55;">MISSION COMPLETE!</span></div>`;
                optArea.innerHTML = ""; return;
            }
            isProcessing = false; 
            const cur = questions[currentIndex];
            document.getElementById('level-txt').innerText = `LVL: ${currentIndex + 1}/${questions.length}`;
            document.body.classList.remove('shake-screen');
            qRow.innerHTML = "";
            const levelTexture = textures[currentIndex % textures.length];

            if (cur.type === 'memory') {
                const block = document.createElement('div');
                block.className = 'mc-block';
                block.style.width = '250px'; block.style.height = '250px';
                block.style.backgroundImage = levelTexture;
                block.innerHTML = `<span>${cur.q}</span>`;
                qRow.appendChild(block);
            } else {
                const safeQ = cur.q.replace(/___/g, ' ___ ').trim();
                const words = safeQ.split(/\s+/); 
                let hasBlank = false;
                words.forEach(w => {
                    const block = document.createElement('div');
                    if (w === '___') { block.className = 'mc-blank'; block.id = 'blank-spot'; hasBlank = true; } 
                    else { block.className = 'mc-block'; block.style.backgroundImage = levelTexture; block.innerHTML = `<span>${w}</span>`; }
                    qRow.appendChild(block);
                });
                if (!hasBlank) { const blankBlock = document.createElement('div'); blankBlock.className = 'mc-blank'; blankBlock.id = 'blank-spot'; qRow.appendChild(blankBlock); }
            }

            optArea.innerHTML = "";
            
            // 🔥 SỬA CHỖ NÀY: DÙ LÀ DẠNG NÀO CŨNG ƯU TIÊN HIỆN OPTIONS NẾU CÓ
            let opts = (cur.options && cur.options.length > 0) ? [...cur.options] : [cur.a];
            // Đảm bảo đáp án đúng luôn có trong list để tránh GV gõ thiếu
            if (!opts.includes(cur.a)) opts.push(cur.a);
            
            // Xáo trộn ngẫu nhiên
            opts = opts.sort(() => Math.random() - 0.5);

            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'mc-block mc-ans'; 
                btn.style.backgroundImage = 'var(--tex-grass)'; // Đáp án luôn là cỏ cho dễ nhìn
                btn.innerHTML = `<span>${o}</span>`;
                btn.onclick = () => checkAnswer(o, btn, levelTexture);
                optArea.appendChild(btn);
            });
            xpProgress.style.width = (currentIndex / questions.length) * 100 + "%";
        }

        function checkAnswer(choice, element, levelTexture) {
            if(isProcessing) return; isProcessing = true; 
            
            const cur = questions[currentIndex];
            const isCorrect = (choice === cur.a);
            const blankSpot = document.getElementById('blank-spot');

            if (isCorrect) {
                // PHÁT NHẠC NGAY LẬP TỨC TỪ RAM
                playSound('orb'); 

                if (cur.type !== 'memory' && blankSpot) {
                    blankSpot.className = 'mc-block';
                    blankSpot.style.backgroundImage = levelTexture;
                    blankSpot.innerHTML = `<span>${choice}</span>`;
                    element.style.opacity = '0';
                }

                setTimeout(() => {
                    Array.from(qRow.children).forEach(c => spawnParticles(c));
                    if(cur.type !== 'memory') spawnParticles(element);
                    setTimeout(() => { currentIndex++; loadQuestion(); }, 600);
                }, 400);
            } 
            else {
                playSound('tnt'); // PHÁT TIẾNG NỔ TỨC THÌ

                let targetRect = (blankSpot || qRow.firstChild).getBoundingClientRect();
                const tnt = document.createElement('div');
                tnt.className = 'mc-tnt tnt-drop';
                tnt.style.left = targetRect.left + 'px';
                tnt.style.top = targetRect.top + 'px';
                document.body.appendChild(tnt);

                setTimeout(() => {
                    tnt.classList.add('tnt-fuse');

                    // Nổ sau 1 giây cháy ngòi
                    setTimeout(() => {
                        tnt.classList.remove('tnt-drop');
                        document.body.classList.add('shake-screen');
                        
                        const flash = document.createElement('div');
                        flash.className = 'explosion-flash';
                        document.body.appendChild(flash);
                        setTimeout(() => flash.remove(), 600);

                        spawnParticles(tnt, true);
                        tnt.remove();
                        qRow.innerHTML = ""; optArea.innerHTML = "";
                        setTimeout(() => loadQuestion(), 500); 
                    }, 1000); 
                }, 400);
            }
        }
    </script>
    <script>
    // CHIP NHẬN DỮ LIỆU (BLAST BLOCK)
    document.addEventListener("DOMContentLoaded", async () => {
        const gameId = new URLSearchParams(window.location.search).get('id');
        if (gameId) {
            try {
                let res = await fetch("https://script.google.com/macros/s/AKfycbz2D9oAH4Q21Xf9NZls3J2Ojh7jCZB_H6iIg9dISJaBF79GXiJNr7AwFi819Rt_kctaeQ/exec", { method: 'POST', body: JSON.stringify({ action: 'getGameById', gameType: 'blast', rowId: gameId }) });
                let result = await res.json();
                if (result.success) {
                    questions = result.gameData.questions; 
                    currentIndex = 0; 
                    loadQuestion();
                    showToast("Sẵn sàng!", `Giáo án: ${result.dataName}`, "success");
                }
            } catch(e) { console.error(e); }
        }
    });
    </script>
    <script src="/mhent-ui.js"></script>
    <script type="module" src="/maintenance.js"></script>
</body>
</html>
