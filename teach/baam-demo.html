<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Lucky Number - MHEnt. Edu</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/teach/teach-theme.css"> 
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        button, input, select, textarea { font-family: inherit; }
        body { background: #0f172a; color: #f8fafc; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* MÀN HÌNH CHỜ (START SCREEN) */
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        .lesson-title { font-size: 45px; font-weight: 900; color: #8b5cf6; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }
        .lesson-desc { font-size: 18px; color: #94a3b8; margin-bottom: 40px; max-width: 600px; line-height: 1.6; }
        .btn-start { padding: 15px 40px; font-size: 20px; font-weight: 900; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; background: #8b5cf6; color: white; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); display: inline-flex; align-items: center; gap: 10px; }
        .btn-start:hover { transform: translateY(-5px); filter: brightness(1.1); box-shadow: 0 15px 25px rgba(139, 92, 246, 0.4); }

        /* GIAO DIỆN GAME CHÍNH */
        .teams-bar { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #1e293b; border-bottom: 3px solid #334155; overflow-x: auto; padding-top: 30px; }
        .team-badge { background: #0b1121; border: 2px solid #475569; padding: 15px 25px; border-radius: 12px; text-align: center; min-width: 120px; transition: 0.3s; }
        .team-badge.active { background: #8b5cf6; border-color: #a78bfa; transform: scale(1.1); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }
        .team-name { font-size: 14px; font-weight: 800; color: #cbd5e1; text-transform: uppercase; margin-bottom: 5px; }
        .team-badge.active .team-name { color: #f8fafc; }
        .team-score { font-size: 32px; font-weight: 900; color: white; }

        .game-board { flex: 1; padding: 40px; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .card-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1000px; }
        
        .box-card { width: 150px; height: 120px; background: #334155; border: 4px solid #475569; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: #94a3b8; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(0,0,0,0.2); user-select: none; }
        .box-card:hover { transform: translateY(-5px); border-color: #8b5cf6; color: #a78bfa; background: #1e293b; }
        .box-card.disabled { background: #0f172a; border-color: #1e293b; color: #1e293b; pointer-events: none; opacity: 0.5; box-shadow: none; }

        /* MODAL BẬT LÊN KHI MỞ THẺ */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15,23,42,0.95); z-index: 999; display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; border: 3px solid #8b5cf6; padding: 40px; border-radius: 20px; text-align: center; max-width: 800px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-points-badge { display: inline-block; background: #8b5cf6; color: white; padding: 8px 20px; border-radius: 30px; font-weight: 900; font-size: 18px; margin-bottom: 20px; }
        .modal-question { font-size: 32px; font-weight: 900; color: white; margin-bottom: 40px; line-height: 1.4; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .option-btn { background: #334155; color: white; border: 3px solid #475569; padding: 20px; border-radius: 12px; font-size: 22px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background: #475569; border-color: #94a3b8; transform: translateY(-3px); }
        .option-btn.correct { background: #10b981 !important; border-color: #059669 !important; transform: scale(1.05); }
        .option-btn.wrong { background: #ef4444 !important; border-color: #b91c1c !important; opacity: 0.5; }

        .btn-continue { background: #8b5cf6; color: white; border: none; padding: 15px 40px; border-radius: 12px; font-size: 20px; font-weight: 900; cursor: pointer; display: none; margin: 0 auto; transition: 0.3s;}
        .btn-continue:hover { filter: brightness(1.1); transform: scale(1.05); }

        /* BẢNG XẾP HẠNG (PODIUM) */
        #podium-screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .podium-title { font-size: 50px; font-weight: 900; color: #f59e0b; margin-bottom: 40px; text-transform: uppercase; text-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 300px; margin-bottom: 50px; }
        
        .podium-bar { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; border-radius: 15px 15px 0 0; width: 150px; color: white; padding-bottom: 20px; font-weight: 900; position: relative; }
        .podium-name { position: absolute; top: -40px; font-size: 24px; white-space: nowrap; }
        .podium-score { font-size: 30px; }
        
        .rank-1 { height: 100%; background: linear-gradient(180deg, #f59e0b, #b45309); box-shadow: 0 -10px 30px rgba(245, 158, 11, 0.5); z-index: 3;}
        .rank-2 { height: 75%; background: linear-gradient(180deg, #94a3b8, #475569); z-index: 2;}
        .rank-3 { height: 50%; background: linear-gradient(180deg, #b45309, #78350f); z-index: 1;}

        .other-ranks { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 800px; }
        .rank-pill { background: #1e293b; border: 2px solid #334155; color: white; padding: 10px 20px; border-radius: 30px; font-weight: 800; font-size: 18px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div style="font-size: 18px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px;"><i class="fa-solid fa-gift"></i> MHEnt. Edu Demo</div>
        <h1 class="lesson-title">Lucky Number Challenge</h1>
        <p class="lesson-desc">This is a standalone Demo version to help teachers understand the gameplay mechanics. The game is pre-configured with <b>3 Teams</b> and <b>15 Lucky Number Cards</b> (including Trivia and Special Event cards).</p>
        
        <button class="btn-start" onclick="startDemoGame()"><i class="fa-solid fa-play"></i> Start Demo Game</button>
    </div>

    <div id="main-game" style="display: none; height: 100%; flex-direction: column;">
        <div class="teams-bar" id="teams-bar">
            </div>

        <div class="game-board">
            <div class="card-grid" id="card-grid">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="question-modal">
        <div class="modal-content">
            <div class="modal-points-badge" id="modal-points">Points: 10 Pts</div>
            <div class="modal-question" id="modal-q-text">Loading...</div>
            
            <div class="options-grid" id="modal-options">
                </div>
            
            <button class="btn-continue" id="btn-continue" onclick="closeModalAndNextTurn()">CONTINUE <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="podium-screen">
        <div class="podium-title"><i class="fa-solid fa-trophy"></i> Hall of Fame</div>
        <div class="podium-container" id="podium-bars"></div>
        <div class="other-ranks" id="other-ranks"></div>
    </div>

    <script>
        // Âm thanh
        const audioCorrect = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');
        const audioWrong = new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg');
        const audioSpecial = new Audio('https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg');

        // ==========================================
        // 📚 DỮ LIỆU DEMO CỨNG (KHÔNG CẦN ADMIN)
        // ==========================================
        const DEMO_CARDS = [
            { type: 'question', text: "Fred and his family wanted to go ___ long walks in the mountains.", options: ['to', 'on'], correct: 1, points: 15 },
            { type: 'question', text: "They had three big rucksacks, which they put ___ their backs.", options: ['in', 'on'], correct: 1, points: 10 },
            { type: 'special', text: "Oh no! You dropped your microphone!", points: -10 },
            { type: 'question', text: "On Saturday, they caught a bus to go ___ the station.", options: ['at', 'to'], correct: 1, points: 10 },
            { type: 'question', text: "The next morning, Fred woke ___ and ran to the window.", options: ['up', 'out'], correct: 0, points: 15 },
            { type: 'question', text: "He was so excited that he jumped ___ bed quickly.", options: ['out of', 'into'], correct: 0, points: 20 },
            { type: 'special', text: "Lucky! A fan gave you a free Lightstick!", points: 20 },
            { type: 'question', text: "Fred looked ___ the snow and shouted, 'Come and see!'", options: ['after', 'at'], correct: 1, points: 10 },
            { type: 'question', text: "It was Fred's first time skiing, so he fell ___ many times.", options: ['down', 'over'], correct: 0, points: 15 },
            { type: 'question', text: "He practiced hard because he wanted to be good ___ skiing.", options: ['with', 'at'], correct: 1, points: 20 },
            { type: 'question', text: "If you mix red and blue ___, you get purple.", options: ['together', 'each'], correct: 0, points: 10 },
            { type: 'special', text: "Swap points with another team! (Just kidding, take 10 points instead)", points: 10 },
            { type: 'question', text: "Drivers must stop ___ a red light on the road.", options: ['for', 'at'], correct: 1, points: 15 },
            { type: 'question', text: "But try ___ a minute! Imagine a world without color.", options: ['with', 'for'], correct: 1, points: 25 },
            { type: 'question', text: "Scientists look ___ how colors can change our feelings.", options: ['at', 'for'], correct: 0, points: 20 }
        ];

        let teams = [];
        let cards = [];
        let currentTurnIndex = 0; 
        let currentCardIndex = null; 
        let cardsRemaining = 0;

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId]; array[curId] = array[randId]; array[randId] = tmp;
            }
            return array;
        }

        // Khởi động Demo
        function startDemoGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';

            // Khởi tạo 3 Đội
            teams = [
                { id: 1, name: `Team 1`, score: 0 },
                { id: 2, name: `Team 2`, score: 0 },
                { id: 3, name: `Team 3`, score: 0 }
            ];
            
            // Lấy dữ liệu demo và xáo trộn thẻ
            cards = shuffleArray([...DEMO_CARDS]);
            cardsRemaining = cards.length;
            currentTurnIndex = 0;

            renderTeamsBar();
            renderCardGrid();
        }

        function renderTeamsBar() {
            const bar = document.getElementById('teams-bar');
            bar.innerHTML = '';
            teams.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `team-badge ${i === currentTurnIndex ? 'active' : ''}`;
                div.innerHTML = `<div class="team-name">${t.name}</div><div class="team-score" id="score-${t.id}">${t.score}</div>`;
                bar.appendChild(div);
            });
        }

        function renderCardGrid() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            cards.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'box-card';
                btn.innerText = i + 1; 
                btn.onclick = () => openCard(i, btn);
                grid.appendChild(btn);
            });
        }

        function openCard(index, btnElement) {
            if(btnElement.classList.contains('disabled')) return;
            currentCardIndex = index;
            const cardData = cards[index];

            if(cardData.type === 'question') {
                showQuestionModal(cardData);
            } else {
                showSpecialModal(cardData);
                audioSpecial.play();
            }
            
            btnElement.classList.add('disabled');
            cardsRemaining--;
        }

        // ================= XỬ LÝ MODAL TRẮC NGHIỆM =================
        function showQuestionModal(data) {
            document.getElementById('modal-points').innerText = `Quiz Question | +${data.points} Pts`;
            document.getElementById('modal-points').style.background = '#8b5cf6';
            document.getElementById('modal-q-text').innerText = data.text;
            
            const optGrid = document.getElementById('modal-options');
            optGrid.innerHTML = '';
            optGrid.style.gridTemplateColumns = data.options.length <= 2 ? '1fr 1fr' : '1fr 1fr';
            
            data.options.forEach((optText, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optText;
                btn.onclick = () => checkAnswer(i, data.correct, data.points);
                optGrid.appendChild(btn);
            });

            document.getElementById('btn-continue').style.display = 'none';
            document.getElementById('question-modal').style.display = 'flex';
        }

        function checkAnswer(selectedIndex, correctIndex, points) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.style.pointerEvents = 'none');

            if(selectedIndex === correctIndex) {
                audioCorrect.play();
                btns[selectedIndex].classList.add('correct');
                
                teams[currentTurnIndex].score += points;
                document.getElementById(`score-${teams[currentTurnIndex].id}`).innerText = teams[currentTurnIndex].score;
                
                document.getElementById('modal-q-text').innerHTML = `🎉 CORRECT! <br><span style="font-size:24px; color:#10b981;">Team ${teams[currentTurnIndex].id} got +${points} points!</span>`;
            } else {
                audioWrong.play();
                btns[selectedIndex].classList.add('wrong');
                btns[correctIndex].classList.add('correct'); 
                document.getElementById('modal-q-text').innerHTML = `❌ WRONG! <br><span style="font-size:24px; color:#ef4444;">Team ${teams[currentTurnIndex].id} got no points.</span>`;
            }

            document.getElementById('btn-continue').style.display = 'block';
        }

        // ================= XỬ LÝ MODAL ĐẶC BIỆT =================
        function showSpecialModal(data) {
            let color = data.points > 0 ? '#10b981' : (data.points < 0 ? '#ef4444' : '#f59e0b');
            
            document.getElementById('modal-points').innerText = `SPECIAL CARD 🎁`;
            document.getElementById('modal-points').style.background = color;
            
            let resultText = "";
            if(data.points !== 0) {
                teams[currentTurnIndex].score += data.points;
                document.getElementById(`score-${teams[currentTurnIndex].id}`).innerText = teams[currentTurnIndex].score;
                resultText = `<br><span style="font-size:24px; color:${color};">Team ${teams[currentTurnIndex].id} is affected: ${data.points > 0 ? '+'+data.points : data.points} points!</span>`;
            } else {
                resultText = `<br><span style="font-size:24px; color:${color};">Just a fun activity! No points affected.</span>`;
            }

            document.getElementById('modal-q-text').innerHTML = `${data.text} ${resultText}`;
            document.getElementById('modal-options').innerHTML = ''; 
            
            document.getElementById('btn-continue').style.display = 'block';
            document.getElementById('question-modal').style.display = 'flex';
        }

        function closeModalAndNextTurn() {
            document.getElementById('question-modal').style.display = 'none';
            
            if(cardsRemaining <= 0) {
                showPodium();
            } else {
                currentTurnIndex = (currentTurnIndex + 1) % teams.length;
                renderTeamsBar();
            }
        }

        // ================= BẢNG XẾP HẠNG =================
        function showPodium() {
            document.getElementById('main-game').style.display = 'none';
            document.getElementById('podium-screen').style.display = 'flex';

            let sortedTeams = [...teams].sort((a, b) => b.score - a.score);

            const bars = document.getElementById('podium-bars');
            bars.innerHTML = '';

            if(sortedTeams.length >= 1) {
                if(sortedTeams.length >= 2) bars.appendChild(createBar(sortedTeams[1], 'rank-2'));
                bars.appendChild(createBar(sortedTeams[0], 'rank-1'));
                if(sortedTeams.length >= 3) bars.appendChild(createBar(sortedTeams[2], 'rank-3'));
            }

            const others = document.getElementById('other-ranks');
            others.innerHTML = '';
            for(let i = 3; i < sortedTeams.length; i++) {
                const pill = document.createElement('div');
                pill.className = 'rank-pill';
                pill.innerText = `Rank ${i+1}: ${sortedTeams[i].name} (${sortedTeams[i].score} pts)`;
                others.appendChild(pill);
            }
        }

        function createBar(teamData, rankClass) {
            const div = document.createElement('div');
            div.className = `podium-bar ${rankClass}`;
            div.innerHTML = `<div class="podium-name">${teamData.name}</div><div class="podium-score">${teamData.score}</div>`;
            return div;
        }
    </script>
    <script src="/mhent-ui.js"></script>
    <script src="/check-token.js"></script>
</body>
</html>
