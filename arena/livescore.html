<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCORE - MHEnt. Arena</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff9a55">
    <link rel="apple-touch-icon" href="/assets/icon-web.png">
    <link rel="icon" type="image/jpeg" href="/assets/icon-web.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/arena/arena-theme.css">
    <link rel="stylesheet" href="/mhent-ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, h1, h2, h3, h4, h5, p, span, div { font-family: 'Nunito', sans-serif !important; }
        
        /* ÉP BUỘC DARK MODE CHO LIVESCORE */
        body { background: #0f172a; color: #fff; margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER LIVESCORE */
        .live-header {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 40px; border-bottom: 2px solid rgba(255, 154, 85, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
        }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .live-badge {
            background: #ef4444; color: white; font-weight: 900; font-size: 14px;
            padding: 5px 15px; border-radius: 8px; letter-spacing: 2px;
            animation: pulseLive 1.5s infinite; box-shadow: 0 0 15px rgba(239,68,68,0.5);
            display: flex; align-items: center; gap: 8px;
        }
        @keyframes pulseLive { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        .quiz-title-live { font-size: 28px; font-weight: 900; margin: 0; color: #f8fafc; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .quiz-id-live { font-size: 16px; color: var(--hub-color); font-weight: 800; letter-spacing: 1px; }

        /* NÚT FULLSCREEN TÀNG HÌNH */
        .btn-fullscreen {
            background: transparent; border: 2px solid #334155; color: #94a3b8;
            width: 45px; height: 45px; border-radius: 12px; font-size: 18px;
            cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .btn-fullscreen:hover { background: #334155; color: white; border-color: var(--hub-color); }

        /* KHU VỰC BẢNG VÀNG */
        .leaderboard-container { flex: 1; padding: 40px 5%; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        .board-grid { display: flex; flex-direction: column; gap: 15px; }
        
        /* DÒNG XẾP HẠNG CHUNG */
        .rank-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 15px 25px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInUp 0.5s forwards; opacity: 0; transform: translateY(20px);
        }
        @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }

        .rank-left { display: flex; align-items: center; gap: 20px; }
        .rank-num { 
            width: 50px; height: 50px; border-radius: 12px; background: #334155; 
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; font-weight: 900; color: #94a3b8;
        }
        .player-info { display: flex; flex-direction: column; }
        .player-name { font-size: 22px; font-weight: 800; color: #f8fafc; }
        .player-meta { font-size: 14px; font-weight: 700; color: #64748b; margin-top: 5px; display: flex; align-items: center; gap: 15px;}
        .player-meta span { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 8px;}
        
        .rank-score {
            font-size: 32px; font-weight: 900; color: var(--hub-color);
            background: rgba(255,154,85,0.1); padding: 8px 25px; border-radius: 12px;
            border: 1px solid rgba(255,154,85,0.2); text-shadow: 0 0 15px rgba(255,154,85,0.4);
        }

        /* TOP 3 ĐẶC QUYỀN VVIP */
        .rank-row.top-1 { background: linear-gradient(90deg, rgba(251,191,36,0.15) 0%, #1e293b 100%); border-left: 5px solid #fbbf24; border-color: rgba(251,191,36,0.3); transform: scale(1.02); box-shadow: 0 10px 30px rgba(251,191,36,0.1); z-index: 3;}
        .rank-row.top-1 .rank-num { background: #fbbf24; color: #fff; box-shadow: 0 0 20px rgba(251,191,36,0.5); font-size: 26px;}
        .rank-row.top-1 .player-name { color: #fbbf24; font-size: 26px;}
        .rank-row.top-1 .rank-score { background: #fbbf24; color: #1e293b; border: none; text-shadow: none;}

        .rank-row.top-2 { background: linear-gradient(90deg, rgba(148,163,184,0.1) 0%, #1e293b 100%); border-left: 5px solid #94a3b8; border-color: rgba(148,163,184,0.3); }
        .rank-row.top-2 .rank-num { background: #cbd5e1; color: #334155; }
        .rank-row.top-2 .player-name { color: #e2e8f0; }

        .rank-row.top-3 { background: linear-gradient(90deg, rgba(217,119,6,0.1) 0%, #1e293b 100%); border-left: 5px solid #d97706; border-color: rgba(217,119,6,0.3); }
        .rank-row.top-3 .rank-num { background: #d97706; color: #fff; }
        .rank-row.top-3 .player-name { color: #fdba74; }

        /* FOOTER NHỎ CHO LIVESCORE */
        .live-footer { text-align: center; padding: 20px; color: #64748b; font-size: 13px; font-weight: 700; border-top: 1px solid #334155; }
        #last-update { color: var(--hub-color); }

        /* --- RESPONSIVE CHO LIVESCORE.HTML --- */
        @media (max-width: 768px) {
            .live-header { padding: 15px; flex-direction: column; gap: 10px; text-align: center; }
            .quiz-title-live { font-size: 20px; }
            .btn-fullscreen { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; }
            
            .leaderboard-container { padding: 20px 10px; }
            
            /* Bẻ cấu trúc thẻ Xếp hạng nằm dọc */
            .rank-row { padding: 15px; flex-direction: column; gap: 15px; text-align: center; }
            .rank-left { flex-direction: column; gap: 10px; }
            .player-meta { flex-wrap: wrap; justify-content: center; }
            
            .rank-score { font-size: 24px; padding: 8px 0; width: 100%; box-sizing: border-box; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="live-header">
        <div class="header-brand">
            <div class="live-badge"><i class="fa-solid fa-satellite-dish"></i> LIVE</div>
            <div>
                <h1 class="quiz-title-live" id="display-title">Đang tải Hội thi...</h1>
                <div class="quiz-id-live">ID: <span id="display-id">---</span></div>
            </div>
        </div>
        <button class="btn-fullscreen" onclick="toggleFullScreen()" title="Bật/Tắt Toàn Màn Hình">
            <i class="fa-solid fa-expand" id="fs-icon"></i>
        </button>
    </div>

    <main class="leaderboard-container">
        <div class="board-grid" id="board-grid">
            <div style="text-align: center; color: #64748b; padding: 100px 0; font-size: 20px; font-weight: 800;">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--hub-color); margin-bottom: 20px;"></i><br>
                Đang kết nối tín hiệu trực tiếp với Két Sắt...
            </div>
        </div>
    </main>

    <footer class="live-footer">
        Hệ thống Khảo thí Trực tuyến MHEnt. Arena | Cập nhật lần cuối: <span id="last-update">--:--:--</span>
    </footer>

    <script>
        // 1. KHỞI TẠO CĂN CỨ SUPABASE
        const SUPABASE_URL = 'https://ctzkgchjheirxwejctvl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0emtnY2hqaGVpcnh3ZWpjdHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjA0MTgsImV4cCI6MjA5MTgzNjQxOH0.Wl-sBpH1VvcR6-Y4D4UAVm1f5_brGK3cVIHRJBEhOJ0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');

        // BẢO VỆ CHỮA CHÁY NẾU KHÔNG CÓ MÃ
        if(!quizId) {
            document.body.innerHTML = `<div style="text-align:center; padding:100px; color:#ef4444;"><i class="fa-solid fa-triangle-exclamation fa-5x"></i><h1 style="font-weight:900;">LỖI: THIẾU MÃ CUỘC THI!</h1><p>Cậu phải truy cập bằng link: livescore?id=MÃ_CUỘC_THI</p></div>`;
        } else {
            document.getElementById('display-id').innerText = quizId;
            loadQuizTitle(); 
            fetchLiveScore(); 
            
            // 🚀 BẬT SÓNG THẦN REAL-TIME (CỰC MẠNH)
            const myChannel = supabase.channel('arena-room');
            myChannel
                .on('postgres_changes', { event: '*', schema: 'arena', table: 'results' }, payload => {
                    console.log("🔥 Supabase báo có biến động:", payload);
                    // Lọc tay tại web thay vì nhờ Supabase lọc
                    if (payload.new && payload.new.quiz_id === quizId) {
                        fetchLiveScore(); // Gọi tải lại điểm ngay!
                    }
                })
                .subscribe((status) => {
                    console.log("Trạng thái cắm dây mạng Realtime:", status);
                    if (status === 'SUBSCRIBED') {
                        console.log("✅ Đã kết nối màng nhĩ với Supabase thành công!");
                    } else if (status === 'CHANNEL_ERROR') {
                        console.error("❌ Mất kết nối! Cậu nhớ bật table 'results' trong Publication nhé.");
                    }
                });
        }

        // LẤY TÊN CUỘC THI
        async function loadQuizTitle() {
            try {
                const { data: quiz } = await supabase.schema('arena').from('quizzes').select('title').eq('id', quizId).single();
                if(quiz) document.getElementById('display-title').innerText = quiz.title;
            } catch(e) { console.error(e); }
        }

        // HÀM HÚT ĐIỂM XẾP HẠNG
        async function fetchLiveScore() {
            try {
                const { data: results, error } = await supabase.schema('arena').from('results')
                    .select('*').eq('quiz_id', quizId).eq('is_test_mode', false).order('score', { ascending: false });

                // Cập nhật đồng hồ
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString('vi-VN');

                let grid = document.getElementById('board-grid');

                if (error || !results || results.length === 0) {
                    grid.innerHTML = `<div style="text-align: center; color: #64748b; padding: 100px 0; font-size: 20px; font-weight: 800; border: 2px dashed #334155; border-radius: 20px;"><i class="fa-solid fa-ghost fa-3x" style="margin-bottom:20px; opacity: 0.5;"></i><br>Đấu trường đang trống. Chờ người hùng đầu tiên xuất hiện...</div>`;
                    return;
                }

                // Thuật toán gỡ hòa (Nhanh tay hơn thì xếp trên)
                results.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score; 
                    let pt = (str) => { let m = str.match(/(\d+)\s*phút/); let s = str.match(/(\d+)\s*giây/); return (m ? parseInt(m[1]) : 0) * 60 + (s ? parseInt(s[1]) : 0); };
                    let tA = pt(a.time_taken) || 999999; let tB = pt(b.time_taken) || 999999;
                    if (tA !== tB) return tA - tB; return new Date(a.submit_time) - new Date(b.submit_time); 
                });

                // Render Bảng điểm (Giữ nguyên UI/Animation xịn của cậu)
                let html = '';
                results.forEach((user, index) => {
                    let rankClass = ''; let rankIcon = index + 1;
                    if(index === 0) { rankClass = 'top-1'; rankIcon = '<i class="fa-solid fa-crown fa-beat" style="--fa-animation-duration: 2s;"></i>'; }
                    else if(index === 1) { rankClass = 'top-2'; }
                    else if(index === 2) { rankClass = 'top-3'; }

                    html += `
                        <div class="rank-row ${rankClass}" style="animation-delay: ${index * 0.1}s">
                            <div class="rank-left">
                                <div class="rank-num">${rankIcon}</div>
                                <div class="player-info">
                                    <div class="player-name">${user.name}</div>
                                    <div class="player-meta">
                                        <span><i class="fa-solid fa-graduation-cap"></i> ${user.class_name}</span>
                                        <span><i class="fa-solid fa-bars-progress"></i> <strong style="color:${user.progress === 'Hoàn thành' ? '#10b981' : '#fbbf24'}">${user.progress}</strong></span>
                                        <span><i class="fa-regular fa-clock"></i> ${user.time_taken}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="rank-score">${user.score}</div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            } catch(e) { console.error("Lỗi load Livescore: ", e); }
        }

        // HÀM ÉP TOÀN MÀN HÌNH MÁY CHIẾU
        function toggleFullScreen() {
            let elem = document.documentElement; let icon = document.getElementById('fs-icon');
            if (!document.fullscreenElement) { if (elem.requestFullscreen) elem.requestFullscreen(); icon.className = "fa-solid fa-compress"; } 
            else { if (document.exitFullscreen) document.exitFullscreen(); icon.className = "fa-solid fa-expand"; }
        }
    </script>
    <script src="/mhent-ui.js"></script>
    <script src="/check-token.js"></script>
    <script type="module" src="/maintenance.js"></script>
</body>
</html>
