<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blast Block: Minecraft Edition - MHEnt. Edu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --mc-green: #5db026; --mc-dirt: #866043; --mc-stone: #7a7a7a; --mc-tnt: #d32f2f; }
        body { margin: 0; padding: 0; height: 100vh; background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-matter.png'); color: white; font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #333; border-bottom: 5px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10; }
        .header h1 { margin: 0; color: #55ff55; font-family: monospace; text-transform: uppercase; letter-spacing: 2px; }

        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 60px; }

        /* =========================================
           HÀNG CÂU HỎI (CHUỖI BLOCK)
           ========================================= */
        .question-row {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center;
            max-width: 90vw; perspective: 1000px;
        }

        /* Block từng chữ (Stone) */
        .mc-word {
            background: var(--mc-stone); border: 4px solid #444; border-radius: 4px;
            padding: 15px 20px; font-size: 28px; font-weight: 900;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3), inset 4px 4px 0 rgba(255,255,255,0.1);
            text-transform: uppercase; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        /* Lỗ hổng chờ điền */
        .mc-blank {
            background: #111; border: 4px dashed #555; color: transparent;
            min-width: 120px; min-height: 60px; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.8);
        }

        /* Khi lỗ hổng được đắp gạch (Dirt) */
        .mc-blank.filled {
            background: var(--mc-dirt); border: 4px solid #4d3321; color: white;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4); border-style: solid;
        }

        /* Block khổng lồ cho dạng Memory Card */
        .mc-memory-block {
            width: 250px; height: 250px; background: var(--mc-stone);
            border: 10px solid #444; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900; text-align: center; padding: 20px;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.3), inset 10px 10px 0 rgba(255,255,255,0.1);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;
        }
        .mc-memory-block::before { content: ""; position: absolute; top: -10px; left: -10px; right: -10px; height: 40px; background: var(--mc-green); border-bottom: 10px solid #3f7e14; }
        
        .mc-memory-block.flipped { transform: rotateY(180deg); background: #55ff55; border-color: #3f7e14; }
        .mc-memory-block span { transition: 0.3s; backface-visibility: hidden; }
        .mc-memory-block.flipped span { transform: rotateY(180deg); color: #000; }

        /* =========================================
           KHU VỰC ĐÁP ÁN (DIRT BLOCKS)
           ========================================= */
        .options-area { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .mc-ans {
            min-width: 150px; padding: 20px 30px; background: var(--mc-dirt);
            border: 6px solid #4d3321; border-radius: 4px;
            font-size: 26px; font-weight: 900; cursor: pointer;
            box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4), 5px 5px 15px rgba(0,0,0,0.5); 
            text-transform: uppercase; transition: 0.2s;
        }
        .mc-ans:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .mc-ans:active { transform: translateY(2px); box-shadow: inset -6px -6px 0 rgba(0,0,0,0.4); }

        /* =========================================
           ANIMATIONS (BREAK & EXPLODE)
           ========================================= */
        @keyframes mc-break {
            0% { transform: scale(1); opacity: 1; filter: grayscale(0); }
            30% { transform: scale(1.15) rotate(5deg); filter: contrast(2) brightness(1.5); }
            100% { transform: scale(0) rotate(-15deg); opacity: 0; filter: blur(5px); }
        }
        .break-effect { animation: mc-break 0.5s forwards !important; }

        @keyframes mc-tnt-boom {
            0% { background: white; transform: scale(1); border-color: white; }
            20% { background: #ff0000; transform: scale(1.1) rotate(-3deg); }
            40% { background: white; transform: scale(0.9) rotate(3deg); }
            100% { transform: scale(3); opacity: 0; background: #ffaa00; border-color: #ffaa00; filter: blur(10px); }
        }
        .explode-effect { animation: mc-tnt-boom 0.6s forwards !important; color: transparent !important; }

        .xp-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 12px; background: #000; }
        #xp-progress { width: 0%; height: 100%; background: #55ff55; box-shadow: 0 0 20px #55ff55; transition: 0.5s; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-cube"></i> BLAST BLOCK: MINECRAFT</h1>
        <div id="level-txt" style="font-weight: 900; color: #ffff55; font-size: 20px;">LVL: 1/1</div>
    </div>

    <div class="game-container">
        <div class="question-row" id="question-row">
            <div class="mc-word">ĐANG</div><div class="mc-word">CHỜ</div><div class="mc-word">ADMIN</div>
        </div>

        <div class="options-area" id="options-area"></div>
    </div>

    <div class="xp-bar"><div id="xp-progress"></div></div>

    <script>
        let questions = [], currentIndex = 0, isProcessing = false;
        const qRow = document.getElementById('question-row');
        const optArea = document.getElementById('options-area');
        const xpProgress = document.getElementById('xp-progress');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        // GIẢ LẬP TIẾNG XP (LENG KENG)
        function playXP() {
            if (!audioCtx) return;
            const freqs = [900, 1100, 1400];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.06);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.06);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.06 + 0.1);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i*0.06); osc.stop(audioCtx.currentTime + i*0.06 + 0.1);
            });
        }

        // GIẢ LẬP TIẾNG TNT (BÙM)
        function playTNT() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.6);
            g.gain.setValueAtTime(0.8, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        }

        // Lắng nghe lệnh từ Admin
        window.addEventListener('storage', (e) => {
            if (e.key === 'mhent_blast_cmd') {
                const data = JSON.parse(e.newValue);
                questions = data.payload.questions; 
                currentIndex = 0; 
                loadQuestion();
            }
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                qRow.innerHTML = `<div class="mc-word" style="color:#55ff55;">YOU WIN! XP MAXED!</div>`;
                optArea.innerHTML = ""; 
                return;
            }
            
            isProcessing = false; 
            const cur = questions[currentIndex];
            document.getElementById('level-txt').innerText = `LVL: ${currentIndex + 1}/${questions.length}`;
            
            // 1. RENDER CÂU HỎI
            qRow.innerHTML = "";
            
            if (cur.type === 'memory') {
                // Dạng Memory: Dùng khối khổng lồ
                const block = document.createElement('div');
                block.className = 'mc-memory-block';
                block.innerHTML = `<span>${cur.q}</span>`;
                qRow.appendChild(block);
            } else {
                // Dạng Fill/Choice: Tách chữ thành chuỗi block
                // Thêm khoảng trắng quanh ___ để tách cho chuẩn
                const safeQ = cur.q.replace(/___/g, ' ___ ').trim();
                const words = safeQ.split(/\s+/); 
                let hasBlank = false;

                words.forEach(w => {
                    const block = document.createElement('div');
                    if (w === '___') {
                        block.className = 'mc-word mc-blank';
                        block.id = 'blank-spot';
                        block.innerText = '___';
                        hasBlank = true;
                    } else {
                        block.className = 'mc-word';
                        block.innerText = w;
                    }
                    qRow.appendChild(block);
                });

                // Nếu không gõ ___ thì tự nhét 1 ô trống vào cuối
                if (!hasBlank) {
                    const blankBlock = document.createElement('div');
                    blankBlock.className = 'mc-word mc-blank';
                    blankBlock.id = 'blank-spot';
                    blankBlock.innerText = '___';
                    qRow.appendChild(blankBlock);
                }
            }

            // 2. RENDER ĐÁP ÁN
            optArea.innerHTML = "";
            let opts = (cur.type === 'memory') ? [cur.a] : cur.options;
            
            // Xáo trộn ngẫu nhiên đáp án nếu không phải memory
            if (cur.type !== 'memory') {
                opts = [...opts].sort(() => Math.random() - 0.5);
            }

            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'mc-ans'; 
                btn.innerText = o;
                btn.onclick = () => checkAnswer(o, btn);
                optArea.appendChild(btn);
            });
            
            xpProgress.style.width = (currentIndex / questions.length) * 100 + "%";
        }

        function checkAnswer(choice, element) {
            if(isProcessing) return; 
            isProcessing = true; 
            initAudio();
            
            const cur = questions[currentIndex];
            const correct = cur.a;
            const isCorrect = (choice === correct);

            // =====================================
            // HIỆU ỨNG ĐIỀN TỪ (DÀNH CHO DẠNG CHUỖI)
            // =====================================
            if (cur.type !== 'memory') {
                const blankSpot = document.getElementById('blank-spot');
                if (blankSpot) {
                    blankSpot.innerText = choice;
                    blankSpot.classList.add('filled');
                    // Ẩn nhẹ khối đáp án vừa bấm
                    element.style.transform = 'scale(0)';
                    element.style.opacity = '0';
                }
            }

            // =====================================
            // PHÁN XÉT & ANIMATION
            // =====================================
            setTimeout(() => {
                if (isCorrect) {
                    // ĐÚNG: Nhận XP và Đập khối
                    playXP();
                    
                    if(cur.type === 'memory') {
                        // Lật mặt khối khổng lồ
                        const memBlock = qRow.firstChild;
                        memBlock.classList.add('flipped');
                        memBlock.querySelector('span').innerText = cur.a;
                    }
                    
                    // Delay tí cho lật xong hoặc đắp gạch xong rồi mới đập vỡ
                    setTimeout(() => {
                        Array.from(qRow.children).forEach(c => c.classList.add('break-effect'));
                        element.classList.add('break-effect');
                        
                        setTimeout(() => { 
                            currentIndex++; 
                            loadQuestion(); 
                        }, 600);
                    }, cur.type === 'memory' ? 800 : 400);

                } else {
                    // SAI: BÙMMM! (Nổ cả câu hỏi lẫn đáp án)
                    playTNT();
                    Array.from(qRow.children).forEach(c => c.classList.add('explode-effect'));
                    element.classList.add('explode-effect');
                    
                    setTimeout(() => { 
                        loadQuestion(); // Hồi sinh lại câu đó
                    }, 800); 
                }
            }, cur.type !== 'memory' ? 400 : 0); // Dạng chuỗi đợi 400ms ngắm gạch điền vào rồi mới nổ
        }
    </script>
</body>
</html>
